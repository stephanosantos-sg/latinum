<meta charset="UTF-8">
<title>LATINVM — Lingua Latina</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* ============ LATINVM — glassmorphism theme ============ */
:root {
  --bg1: #12082b;
  --bg2: #2b1055;
  --bg3: #4a1a6b;
  --gold: #f2c14e;
  --gold-soft: rgba(242, 193, 78, .18);
  --ivory: #f7f3e9;
  --text: #f0ecff;
  --text-dim: rgba(240, 236, 255, .62);
  --glass: rgba(255, 255, 255, .07);
  --glass-strong: rgba(255, 255, 255, .12);
  --glass-border: rgba(255, 255, 255, .14);
  --green: #58d68d;
  --red: #ec7063;
  --blue: #5dade2;
  --yellow-known: rgba(242, 193, 78, .35);
  --blue-new: rgba(93, 173, 226, .35);
  --radius: 20px;
  --nav-h: 66px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  color: var(--text);
  background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 120%);
  background-attachment: fixed;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed; inset: 0;
  background:
    radial-gradient(600px 400px at 85% -5%, rgba(242,193,78,.10), transparent 60%),
    radial-gradient(700px 500px at -10% 100%, rgba(93,173,226,.10), transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.glass {
  background: var(--glass);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  border: 1px solid var(--glass-border);
  box-shadow: 0 8px 32px rgba(0, 0, 0, .25);
}

/* ============ TOP BAR ============ */
.topbar {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px;
  border-radius: 0 0 var(--radius) var(--radius);
  border-top: none;
}
.brand { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.brand-icon { font-size: 1.5rem; }
.brand-name { font-family: Georgia, "Times New Roman", serif; letter-spacing: .25em; font-weight: 700; color: var(--gold); font-size: 1.05rem; }
.stats { display: flex; align-items: center; gap: 14px; }
.stat { display: flex; align-items: center; gap: 4px; font-weight: 700; font-size: .95rem; }
.stat-icon { font-size: 1.05rem; }
.stat.rank { background: var(--gold-soft); border: 1px solid rgba(242,193,78,.4); color: var(--gold); padding: 3px 10px; border-radius: 999px; font-size: .78rem; font-family: Georgia, serif; }
.sync-chip {
  border: 1px solid var(--glass-border); background: var(--glass-strong);
  color: var(--text); border-radius: 999px; padding: 4px 10px;
  font-size: .74rem; font-weight: 700; cursor: pointer;
}
.sync-chip.on { border-color: rgba(88,214,141,.5); color: var(--green); background: rgba(88,214,141,.12); }
.srs-stats { font-size: .88rem; margin-bottom: 12px; color: var(--text); }
.srs-stats b { color: var(--gold); }
.forecast { display: flex; gap: 8px; align-items: flex-end; }
.fc-col { flex: 1; text-align: center; }
.fc-bar { background: linear-gradient(180deg, var(--gold), #e8a838); border-radius: 6px 6px 2px 2px; margin: 0 auto; width: 70%; }
.fc-n { font-size: .74rem; font-weight: 700; margin-top: 3px; }
.fc-l { font-size: .64rem; color: var(--text-dim); }

/* ============ MAIN ============ */
main {
  position: relative; z-index: 1;
  max-width: 680px; margin: 0 auto;
  padding: 20px 16px calc(var(--nav-h) + 30px);
  min-height: calc(100vh - 60px);
}

h1.page-title { font-family: Georgia, serif; font-size: 1.5rem; color: var(--gold); margin: 6px 4px 4px; letter-spacing: .04em; }
p.page-sub { color: var(--text-dim); margin: 0 4px 18px; font-size: .92rem; }

/* ============ COURSE PATH ============ */
.unit-card {
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 16px;
  position: relative;
  transition: transform .15s ease;
}
.unit-card:not(.locked):hover { transform: translateY(-2px); }
.unit-card.locked { opacity: .45; filter: grayscale(.6); }
.unit-head { display: flex; align-items: center; gap: 14px; cursor: pointer; }
.unit-icon {
  width: 54px; height: 54px; flex: none;
  display: grid; place-items: center;
  font-size: 1.7rem;
  background: var(--glass-strong);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
}
.unit-icon.done { background: var(--gold-soft); border-color: rgba(242,193,78,.5); }
.unit-info { flex: 1; min-width: 0; }
.unit-cap { font-size: .72rem; letter-spacing: .18em; color: var(--gold); font-family: Georgia, serif; text-transform: uppercase; }
.unit-title { font-family: Georgia, serif; font-size: 1.15rem; margin: 1px 0 2px; }
.unit-sub { font-size: .82rem; color: var(--text-dim); }
.unit-progress { height: 7px; border-radius: 99px; background: rgba(255,255,255,.10); margin-top: 12px; overflow: hidden; }
.unit-progress > div { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--gold), #ffdd87); transition: width .4s ease; }
.unit-crowns { position: absolute; top: 14px; right: 16px; font-size: .85rem; color: var(--gold); font-weight: 700; }

.lesson-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
.lesson-chip {
  flex: 1; min-width: 130px;
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  border-radius: 14px;
  background: var(--glass-strong);
  border: 1px solid var(--glass-border);
  cursor: pointer;
  font-size: .86rem; font-weight: 600;
  transition: background .15s;
}
.lesson-chip:hover { background: rgba(255,255,255,.18); }
.lesson-chip.done { border-color: rgba(88,214,141,.5); }
.lesson-chip.done .lc-status { color: var(--green); }
.lesson-chip.locked { opacity: .4; pointer-events: none; }
.lc-icon { font-size: 1.1rem; }
.lc-status { margin-left: auto; font-size: .8rem; color: var(--text-dim); }

/* ============ LESSON VIEW ============ */
.lesson-top { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.btn-quit { border: none; background: var(--glass-strong); color: var(--text); width: 38px; height: 38px; border-radius: 12px; font-size: 1.05rem; cursor: pointer; }
.progressbar { flex: 1; height: 12px; border-radius: 99px; background: rgba(255,255,255,.12); overflow: hidden; }
.progressbar > div { height: 100%; background: linear-gradient(90deg, var(--green), #8ff0b4); border-radius: 99px; transition: width .3s ease; width: 0; }
.combo { font-weight: 800; color: var(--gold); font-size: .9rem; min-width: 46px; text-align: right; }

.exercise { border-radius: var(--radius); padding: 22px 20px; animation: slideIn .25s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: none; } }
.ex-kind { font-size: .72rem; letter-spacing: .16em; text-transform: uppercase; color: var(--gold); font-family: Georgia, serif; margin-bottom: 10px; }
.ex-prompt { font-size: 1.25rem; font-weight: 700; line-height: 1.45; margin-bottom: 6px; }
.ex-prompt .la { font-family: Georgia, serif; }
.ex-hint { color: var(--text-dim); font-size: .88rem; margin-bottom: 14px; }

.speak-btn { border: none; background: var(--glass-strong); border: 1px solid var(--glass-border); color: var(--text); border-radius: 12px; padding: 6px 12px; cursor: pointer; font-size: 1rem; margin-bottom: 12px; }
.tts-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
.tts-row .speak-btn { margin-bottom: 8px; }
.tts-rate { font-size: .82rem; font-weight: 700; color: var(--gold); min-width: 44px; text-align: center; margin-bottom: 8px; }

/* flashcard */
.flashcard { text-align: center; padding: 18px 0 6px; }
.flashcard .fc-word { font-family: Georgia, serif; font-size: 2.2rem; color: var(--gold); }
.flashcard .fc-forms { color: var(--text-dim); font-style: italic; margin: 2px 0 10px; }
.flashcard .fc-pt { font-size: 1.25rem; font-weight: 700; margin: 8px 0; }
.flashcard .fc-ex { color: var(--text-dim); font-style: italic; font-family: Georgia, serif; margin-top: 10px; font-size: 1rem; }

/* options */
.options { display: grid; gap: 10px; margin-top: 14px; counter-reset: optn; }
.opt {
  border: 1px solid var(--glass-border);
  background: var(--glass-strong);
  color: var(--text);
  border-radius: 14px;
  padding: 14px 16px;
  font-size: 1.02rem; font-weight: 600;
  cursor: pointer; text-align: left;
  transition: background .12s, border-color .12s;
}
.opt:hover { background: rgba(255,255,255,.18); }
.opt.correct { border-color: var(--green); background: rgba(88,214,141,.2); }
.opt.wrong { border-color: var(--red); background: rgba(236,112,99,.2); }
.opt:disabled { cursor: default; }
.opt .la { font-family: Georgia, serif; }

/* word bank / builder */
.build-area { min-height: 56px; border: 1.5px dashed var(--glass-border); border-radius: 14px; padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
.bank { display: flex; flex-wrap: wrap; gap: 8px; }
.token {
  border: 1px solid var(--glass-border);
  background: var(--glass-strong);
  color: var(--text);
  font-family: Georgia, serif;
  border-radius: 12px; padding: 9px 14px;
  font-size: 1.02rem; cursor: pointer;
}
.token:hover { background: rgba(255,255,255,.2); }
.token.ghost { opacity: .25; pointer-events: none; }
#build-area .token { touch-action: none; cursor: grab; }
#build-area .token.dragging { opacity: .75; transform: scale(1.08); cursor: grabbing; box-shadow: 0 6px 16px rgba(0,0,0,.4); }

/* typed */
.type-input {
  width: 100%; padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid var(--glass-border);
  background: rgba(0,0,0,.25);
  color: var(--text);
  font-size: 1.1rem; font-family: Georgia, serif;
  outline: none; margin-top: 12px;
}
.type-input:focus { border-color: var(--gold); }

/* gap / listen / read */
.gap-input {
  display: inline-block; width: 150px;
  margin: 0 6px; padding: 6px 10px;
  text-align: center; font-size: 1.05rem;
  border-radius: 10px;
}
.listen-big { display: flex; align-items: center; gap: 12px; margin: 10px 0 6px; }
.listen-btn {
  border: none; cursor: pointer;
  width: 72px; height: 72px; border-radius: 22px;
  font-size: 2rem;
  background: linear-gradient(135deg, var(--gold), #e8a838);
  box-shadow: 0 6px 20px rgba(242,193,78,.35);
}
.listen-btn:active { transform: scale(.95); }
.mini-read {
  font-size: 1.08rem !important; line-height: 1.9 !important;
  background: rgba(0,0,0,.18);
  border: 1px solid var(--glass-border);
  border-radius: 14px; padding: 14px 16px;
}

/* pairs */
.pairs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.pair-btn { border: 1px solid var(--glass-border); background: var(--glass-strong); color: var(--text); border-radius: 14px; padding: 13px 10px; font-size: .98rem; font-weight: 600; cursor: pointer; }
.pair-btn.sel { border-color: var(--gold); background: var(--gold-soft); }
.pair-btn.done { opacity: .28; pointer-events: none; border-color: var(--green); }
.pair-btn.shake { animation: shake .3s; }
@keyframes shake { 25% { transform: translateX(-5px);} 75% { transform: translateX(5px);} }
.pair-btn .la { font-family: Georgia, serif; }

/* feedback bar */
.feedback {
  margin-top: 18px; border-radius: 16px; padding: 14px 16px;
  display: none; align-items: center; gap: 12px;
}
.feedback.show { display: flex; animation: slideUp .2s ease; }
@keyframes slideUp { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: none;} }
.feedback.ok { background: rgba(88,214,141,.16); border: 1px solid rgba(88,214,141,.45); }
.feedback.bad { background: rgba(236,112,99,.16); border: 1px solid rgba(236,112,99,.45); }
.fb-text { flex: 1; font-weight: 600; font-size: .95rem; }
.fb-text small { display: block; font-weight: 400; color: var(--text-dim); margin-top: 2px; }

.btn-main {
  display: block; width: 100%;
  margin-top: 16px;
  border: none; border-radius: 16px;
  padding: 15px;
  font-size: 1.02rem; font-weight: 800; letter-spacing: .03em;
  background: linear-gradient(135deg, var(--gold), #e8a838);
  color: #2b1c05; cursor: pointer;
  box-shadow: 0 6px 20px rgba(242,193,78,.3);
  transition: transform .1s;
}
.btn-main:hover { transform: translateY(-1px); }
.btn-main:disabled { opacity: .4; box-shadow: none; cursor: default; }
.btn-ghost { background: var(--glass-strong); color: var(--text); box-shadow: none; border: 1px solid var(--glass-border); }

/* lesson end */
.lesson-end { text-align: center; padding: 40px 20px; border-radius: var(--radius); }
.lesson-end .big { font-size: 3.2rem; }
.lesson-end h2 { font-family: Georgia, serif; color: var(--gold); margin: 10px 0 4px; }
.end-stats { display: flex; justify-content: center; gap: 14px; margin: 22px 0; flex-wrap: wrap; }
.end-stat { background: var(--glass-strong); border: 1px solid var(--glass-border); border-radius: 16px; padding: 12px 20px; }
.end-stat b { display: block; font-size: 1.3rem; color: var(--gold); }
.end-stat span { font-size: .78rem; color: var(--text-dim); }

/* ============ READER (LingQ style) ============ */
.reader { border-radius: var(--radius); padding: 24px 22px; }
.reader h2 { font-family: Georgia, serif; color: var(--gold); margin-bottom: 2px; }
.reader .r-meta { color: var(--text-dim); font-size: .84rem; margin-bottom: 16px; }
.reader-text { font-family: Georgia, "Times New Roman", serif; font-size: 1.22rem; line-height: 2.05; }
.reader-text p { margin-bottom: 14px; }
.w { cursor: pointer; border-radius: 6px; padding: 1px 2px; transition: background .12s; }
.w:hover { background: rgba(255,255,255,.16); }
.w.new { background: var(--blue-new); }
.w.learning { background: var(--yellow-known); }
.snt { border-radius: 8px; transition: background .3s; padding: 1px 0; }
.pa-input {
  width: 64px; display: inline-block;
  border: 1px solid var(--gold); border-radius: 8px;
  background: rgba(0,0,0,.3); color: var(--gold);
  font-family: Georgia, serif; font-size: 1rem;
  padding: 2px 6px; margin: 0 1px; text-align: center;
  outline: none;
}
.pa-input.pa-ok { border-color: var(--green); color: var(--green); background: rgba(88,214,141,.12); }
.pa-input.pa-bad { border-color: var(--red); color: var(--red); background: rgba(236,112,99,.12); }
.snt.playing { background: rgba(242, 193, 78, .14); box-shadow: 0 0 0 4px rgba(242,193,78,.14); }
.speak-btn.toggled { border-color: var(--gold); color: var(--gold); background: var(--gold-soft); }
.reader-legend { display: flex; gap: 14px; margin: 4px 0 16px; font-size: .78rem; color: var(--text-dim); flex-wrap: wrap; }
.reader-legend i { display: inline-block; width: 12px; height: 12px; border-radius: 4px; margin-right: 4px; vertical-align: -1px; }

.gloss-pop {
  position: fixed; z-index: 100;
  max-width: 300px;
  border-radius: 16px; padding: 14px 16px;
  background: rgba(26, 16, 51, .92);
}
.gloss-pop .g-word { font-family: Georgia, serif; font-size: 1.2rem; color: var(--gold); }
.gloss-pop .g-forms { font-style: italic; color: var(--text-dim); font-size: .82rem; margin-bottom: 4px; }
.gloss-pop .g-pt { font-weight: 700; margin: 4px 0; }
.gloss-pop .g-note { font-size: .8rem; color: var(--text-dim); }
.gloss-pop .g-actions { display: flex; gap: 8px; margin-top: 10px; }
.gloss-pop .g-actions button { flex: 1; border: 1px solid var(--glass-border); background: var(--glass-strong); color: var(--text); border-radius: 10px; padding: 6px 8px; font-size: .76rem; cursor: pointer; }

/* library list */
.lib-section { font-family: Georgia, serif; color: var(--gold); font-size: 1.05rem; margin: 22px 4px 10px; }
.lib-section small { color: var(--text-dim); font-family: -apple-system, sans-serif; font-size: .75rem; font-weight: 400; margin-left: 6px; }
.lib-item { display: flex; align-items: center; gap: 14px; border-radius: var(--radius); padding: 16px; margin-bottom: 12px; cursor: pointer; transition: transform .12s; }
.lib-item:hover { transform: translateY(-2px); }
.lib-item.locked { opacity: .45; pointer-events: none; }
.lib-icon { font-size: 1.6rem; }
.lib-info { flex: 1; }
.lib-title { font-family: Georgia, serif; font-size: 1.05rem; }
.lib-sub { font-size: .8rem; color: var(--text-dim); }

/* ============ GRAMMAR CARDS ============ */
.gram-card { border-radius: var(--radius); padding: 18px 20px; margin-bottom: 14px; }
.gram-card h3 { font-family: Georgia, serif; color: var(--gold); margin-bottom: 8px; font-size: 1.05rem; }
.gram-card p { font-size: .93rem; line-height: 1.6; color: var(--text); }
.gram-card .ex-la { font-family: Georgia, serif; font-style: italic; color: var(--gold); }
.gram-card table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: .9rem; }
.gram-card td, .gram-card th { padding: 6px 8px; border-bottom: 1px solid var(--glass-border); text-align: left; }
.gram-card th { color: var(--text-dim); font-weight: 600; font-size: .78rem; text-transform: uppercase; letter-spacing: .08em; }
.gram-card td.la { font-family: Georgia, serif; color: var(--gold); }

/* ============ PROFILE ============ */
.prof-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
.prof-card { border-radius: var(--radius); padding: 18px; text-align: center; }
.prof-card .big { font-size: 1.9rem; font-weight: 800; color: var(--gold); }
.prof-card .lbl { font-size: .78rem; color: var(--text-dim); margin-top: 2px; }
.rank-track { border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
.rank-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; opacity: .45; }
.rank-item.reached { opacity: 1; }
.rank-item.current { opacity: 1; }
.rank-item.current .rk-name { color: var(--gold); font-weight: 800; }
.rk-badge { width: 34px; text-align: center; font-size: 1.2rem; }
.rk-name { font-family: Georgia, serif; }
.rk-xp { margin-left: auto; font-size: .8rem; color: var(--text-dim); }

/* ============ BOTTOM NAV ============ */
.bottomnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  height: var(--nav-h);
  display: flex; justify-content: space-around; align-items: center;
  border-radius: var(--radius) var(--radius) 0 0;
  border-bottom: none;
  padding: 0 8px calc(env(safe-area-inset-bottom, 0px) / 2);
}
.nav-btn {
  position: relative;
  border: none; background: none; color: var(--text-dim);
  font-size: .68rem; font-weight: 700;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  cursor: pointer; padding: 8px 14px; border-radius: 14px;
}
.nav-btn span { font-size: 1.35rem; }
.nav-btn.active { color: var(--gold); background: var(--gold-soft); }
.badge {
  position: absolute; top: 2px; right: 6px;
  background: var(--red); color: #fff;
  font-size: .62rem; font-style: normal;
  border-radius: 99px; padding: 1px 6px; font-weight: 800;
}

/* ============ MORFOLOGIA ============ */
.g-morph {
  margin: 6px 0; padding: 6px 10px;
  background: var(--gold-soft); border: 1px solid rgba(242,193,78,.35);
  border-radius: 10px; font-size: .82rem;
}
.g-table-btn {
  border: 1px solid var(--glass-border); background: var(--glass-strong);
  color: var(--text); border-radius: 8px; padding: 2px 8px;
  font-size: .74rem; cursor: pointer; margin-left: 6px;
}
.paradigm-ov[hidden] { display: none !important; }
.paradigm-ov {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(10, 5, 25, .6);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 18px;
}
.paradigm-card {
  border-radius: var(--radius); padding: 20px;
  max-width: 420px; width: 100%;
  max-height: 85vh; overflow-y: auto;
  background: rgba(26, 16, 51, .95);
}
.paradigm-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: .92rem; }
.paradigm-table th { color: var(--text-dim); font-weight: 600; font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; padding: 6px 8px; text-align: left; }
.paradigm-table td { padding: 7px 8px; border-bottom: 1px solid var(--glass-border); font-family: Georgia, serif; cursor: pointer; border-radius: 6px; }
.paradigm-table td:hover { background: rgba(255,255,255,.1); }
.paradigm-table td.hit { background: var(--gold-soft); color: var(--gold); font-weight: 700; box-shadow: inset 0 0 0 1px rgba(242,193,78,.5); }
.hm-table { border-collapse: collapse; font-size: .72rem; }
.hm-table th { color: var(--text-dim); font-weight: 600; padding: 3px 6px; text-align: left; white-space: nowrap; }
.hm-table td.hm { width: 30px; height: 22px; border-radius: 6px; border: 2px solid var(--bg2); background: rgba(255,255,255,.08); }
.hm-table td.hm-g { background: var(--green); }
.hm-table td.hm-y { background: var(--gold); }
.hm-table td.hm-r { background: var(--red); }

/* toast */
.toast {
  position: fixed; left: 50%; bottom: calc(var(--nav-h) + 18px);
  transform: translateX(-50%);
  z-index: 200;
  padding: 12px 22px; border-radius: 99px;
  font-weight: 700; font-size: .92rem;
  background: rgba(26,16,51,.92);
  animation: slideUp .25s ease;
}

/* teclas de atalho (desktop) */
@media (hover: hover) and (min-width: 700px) {
  .options .opt { counter-increment: optn; position: relative; padding-left: 44px; }
  .options .opt::before {
    content: counter(optn);
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 22px; height: 22px; line-height: 22px; text-align: center;
    font-size: .72rem; font-weight: 800; color: var(--text-dim);
    border: 1px solid var(--glass-border); border-radius: 6px;
  }
  .pairs-grid { counter-reset: pairn; }
  .pairs-grid .pair-btn { counter-increment: pairn; position: relative; }
  .pairs-grid .pair-btn::after {
    content: counter(pairn);
    position: absolute; left: 6px; top: 4px;
    font-size: .6rem; font-weight: 800; color: var(--text-dim);
  }
  .kbd-hint { display: block !important; }
}
.kbd-hint { display: none; text-align: center; color: var(--text-dim); font-size: .74rem; margin-top: 10px; }
.kbd-hint kbd {
  background: var(--glass-strong); border: 1px solid var(--glass-border);
  border-radius: 5px; padding: 1px 6px; font-family: inherit; font-size: .7rem;
}

@media (max-width: 480px) {
  .stats { gap: 9px; }
  .stat { font-size: .85rem; }
  .stat.rank { display: none; }
  .reader-text { font-size: 1.12rem; }
  .pairs-grid { grid-template-columns: 1fr 1fr; }
}

ante Marīnum lābitur. Clāmant omnēs et Neptūnum invocant: “Servā nōs, Neptūne!” Nāvis sine gubernātōre in marī turbidō errat atque aquā implērī incipit. Nautae aquam haurīre cōnantur ac mercēs gravēs in mare iaciunt.\n\nTum vērō, omnibus perterritīs, Marīnus tranquillus in locō gubernātōris cōnsīdit: is nāvem contrā ventum vertit et in mediīs ﬂūctibus rēctē gubernat. Ita nāvis servātur nec ﬂūctibus mergitur. Paulō post ventus cadere incipit.\n\nLaetantur omnēs et Marīnum ut optimum gubernātōrem laudant eumque ‘alterum Palinūrum’ vocant.\n\nMīciō laetus fīlium complectitur et “Profectō” inquit “tū nōn sōlum librōs legere, sed etiam nāvem gubernāre scīs!”\n\nMarīnus autem “Librum legēbam” inquit “dē Palinūrō, optimō gubernātōre. Ut vidēs, librī meī multās rēs mē docēre possunt.”"

  "text": "Magister Diodōrus, postquam discipulōs numerōs breviter scrībere docuit, sex numerōs iīs dictat: ‘quattuor’, ‘novem’, ‘quattuordecim’, ‘ūndēvīgintī’, ‘quadringenta’, ‘nōngenta’. Cūr magister ‘quadringenta’ et ‘nōngenta’ dīcit, nōn ‘quadringentī’ et nōngentī’? Numerī quī in -genta dēsinunt sunt neutrum plūrālis.\n\nQuisque discipulus suō modō numerōs scrībit. Sextus sīc scrībit: IV, IX, XI, XIX, CD, CM; Titus sīc: IV, IX, XIV, XIX, XL, XC; Mārcus sīc: IIII, VIIII, XIIII, XVIIII, CCCC, DCCCC.\n\nDiodōrus, postquam numerōs dictāvit et discipulī eōs scrīpsērunt, tabulam cuiusque discipulī in manūs sūmit et spectat id quod scrīptum est. Nēmō discipulus omnēs numerōs rēctē scrīpsit, at magister Sextum et Titum quattuor numerōs rēctē scrīpsisse videt. “Vōs” inquit “quattuor numerōs rēctē scrīpsistis, Sexte et Tite.”\n\nSextus: “Scrīpsimus ita ut nōs numerōs scrībere docuistī.”\n\nDiodōrus: “Nec vērō tē CD et CM scrībere docuī, Sexte, nam C rārō pōnitur ante D et M, ‘quadringenta’ et ‘nōngenta’ rēctius scrībuntur CCCC et DCCCC.”\n\nMārcus: “Ego ita scrīpsī!” Mārcus dīcit ‘sē ita scrīpsisse’\n\nMagister: “Tū rēctē C quater scrīpsistī in iīs numerīs, sed etiam I quater scrīpsistī in numerīs ‘quattuor’, ‘novem’, ‘quattuordecim’, ‘ūndēvīgintī’: IIII, VIIII, XIIII, XVIIII. Id tē nōn docuī! Sciō antīquōs Rōmānōs totiēs I scrīpsisse, sed hodiē littera I pōnitur ante V et X: ‘quattuor’ scrībitur IV, ‘novem’ IX, ‘quattuordecim’ XIV, ‘ūndēvīgintī’ XIX – hī numerī rēctē scrīptī sunt ā Sextō et Titō.” Magister dīcit ‘hōs numerōs ā Sextō et Titō rectē scrīptōs esse.’ Tum magister sē vertit ad Titum, quī XL et XC scrīpsit, et “Sed cūr tū” inquit “XL et XC scrīpsistī? Eae litterae signiﬁcant ‘quadrāgintā et ‘nōnāgintā’, nōn ‘quadringenta’ et ‘nōngenta’, ut ego vōbīs dictāvī.”\n\nTitus: “Ego tē ‘quadrāgintā’ et ‘nōnāgintā’ dīcere audīvī.”\n\nMagister: “Male audīvistī! Tūne malās aurēs habēs? Profectō ‘quadringenta’ et ‘nōngenta’ dīxī. Nōnne vōs mē ita dīcere audīvistis, Mārce et Sexte?”\n\nSextus: “Certē nōs ita tē dīcere audīvimus. Scrīpsimus eōs numerōs quōs nōbīs dictāvistī.” Sextus et Mārcus magistrum numerōs ‘quadringenta’ et ‘nōngenta’ dictantem bene audīvērunt, Titus male audīvit.\n\nMārcus: “Sed ego ūnus ex tribus discipulīs eōs numerōs rēctē scrīpsī! Cūr mē nōn laudāvistī, magister?”\n\nMagister: “Tē nōn laudāvī, quia aliōs quattuor numerōs prāvē scrīpsistī.”\n\nMārcus: “Ego scrīpsī ut antīquī Rōmānī scrībēbant. Num tū antīquōs Rōmānōs prāvē scrīpsisse putās?”"

  "text": "Dōrippa, amīca Lÿdiae, sōla habitat Rōmae in domō apud Tiberim ﬂūmen. Forēs domūs cūstōdit iānitor, cui nōmen est Sanniō.\n\nDōrippa Lepidum amīcum habēbat, sed iam eum ē domō suā pepulit, quia eum falsum amīcum esse arbitrātur.\n\nDomum reversus Dōrippa iānitōrī “Sī Lepidus redit” inquit, “nōlī admittere eum! Virum illum improbum iam vidēre nōlō. Nōn mē, sed ancillam amat.”\n\nVesperī Lepidus cum novīs ﬂōribus redit atque iānuam pulsat clāmāns: “Heus, iānitor! Aperī iānuam! Lepidus sum. Veniō amīcam meam salūtātum.”\n\nSanniō: “Nōn licet mihi tē admittere. Dōrippa tēcum colloquī nōn vult. Putō eam iam dormītum iisse. Dīcit ‘nōn sē, sed aliam fēminam ā tē amārī’.”\n\nLepidus: “Nōn vērum est quod illa dīcit. Ego sum vērus amīcus quī amīcam meam nōn fallō.\n\nNecesse mihi est cum eā colloquī.”\n\nSanniō: “Sed Dōrippa mē iubet tibi iānuam claudere.”\n\nLepidus: “Nōn oportet illī fēminae sevērae pārēre! Iam aperī iānuam!”\n\nSanniō: “Profectō dominae meae pārēbō. Tē nōn admittō.”\n\nLepidus dēnārium prōmit et iānitōrī ostendit: “Ecce dēnārius” inquit, “sī iānuam mihi aperīs, dēnārium tibi dō.”\n\nSanniō: “Quamquam pauper sum, istam pecūniam ā tē accipere nōlō. Ego dominam meam nōn fallō!”\n\nTandem Lepidus intellegit sē iānitōrem probum nūllō modō movēre posse. Flōrēs ante forēs iaciēns “Valē” inquit, “iānitor – dūrior quam forēs tuae!”"

  "level": "cap. I–XXIII",
  "text": "Lēander, servus Iūliī, postquam in forō Tūsculānō piscēs et ōva ēmit, viam angustam intrat quae ā forō ad portam oppidī dūcit. In eā viā dominō Cornēliō occurrit, quī equō vehitur ad forum. Lēander ipse ā forō vehitur asinō. Necesse est utrumque cōnsistere, nam nimis angusta est via. Sed neuter eōrum, nec dominus nec servus, recēdere vult.\n\nCornēlius vultū sevērō servum aspiciēns “Heus tū, serve!” inquit, “Cēde mihi! Iubē asinum tuum ad forum revertī!”\n\nAd hoc Lēander, quī scit asinum suum pāritūrum nōn esse, “Asinus meus” inquit “mihi hoc iubentī nōn pārēbit. Prōcēdere vult, recēdere nōn vult! Atque ego iam procul absum ā forō. Tū redī ad portam!”\n\nAt dominus īrātus “Profectō” inquit “nōlō tibi, sordidō servō, cēdere! Nisi tū mihi cēdis, hōc baculō tē et asinum tuum verberātūrus sum!” Cornēlius dīcit ‘sē servum et asinum eius verberātūrum esse’ ac sōlus adversus Lēandrum accēdit baculum ante sē tenēns.\n\nTum vērō asinus rudere incipit: “Hīaāhīaā...!” Turpissimā asinī vōce territus equus in pedēs posteriōrēs surgēns sē vertit atque ē locō fugit. Asinus cum Lēandrō equum currentem sequitur neque Cornēlius eum retinēre potest.\n\nRubēns ob pudōrem Cornēlius redit ad equum suum, quī intrā portam dominum exspectat."

  "level": "cap. I–XXIV",
  "text": "Hōra septima est. Eā hōrā Cornēlius ambulātum īre solet antequam lavātum it, sed hodiē propter imbrem et tonitrum ambulāre nōn potest. Domī manet apud uxōrem suam Fabiam, quae in ātriō Sextum fīlium exspectat.\n\nFabia: “Sextus ante hōram septimam redīre solet. Quid eum agere putās?”\n\nCornēlius: “Per hunc imbrem ac tonitrum ambulāre nōn potest. Putō eum sub tēctō exspectāre dum tonitrus dēsinet.”\n\nTandem iānua aperītur et Sextus ātrium intrat. Parentēs vērō fīlium suum vix cognōscunt, nam faciēs puerī cruenta est atque vestis eius sordida. “Salvēte, pater et māter!” inquit puer. “Ō mī fīlī!” inquit māter cruōrem cōnspiciēns, “Quid tibi factum est?”\n\nSextus: “Pugnāvī cum Mārcō et Titō. Iī mē pulsāvērunt, postquam ego Mārcum pulsāvī.”\n\nFabia: “Cūr tū Mārcum pulsāvistī?\n\nSextus: “Quia ille dīxerat ‘mātrem meam fēminam turpem esse!’’\n\nCornēlius : “Quid? Itane dīxit ille puer improbus?”\n\nSextus: “Nōn iīs ipsīs verbīs. Dīxit ‘suam mātrem fōrmōsissimam esse’ ac ‘mātrem meam sine ōrnāmentīs fōrmōsam nōn esse.’ Posteā mē ‘puerum barbarum’ vocāvit, quod eum pulsāveram.”\n\nCornēlius: “Profectō nōn sine causā Mārcum pulsāvistī, quia mātrī tuae male dīxerat! Nam māter tua fōrmōsior est quam māter Mārcī, etiam sī illa plūra et pulchriōra ōrnāmenta habet.\n\nNec tū puer barbarus es, sed doctior Mārcō.”\n\nSextus: “Certē nōn tam indoctus sum quam ille: rēctius et pulchrius scrībō ac melius computō.\n\nMagister mē laudāvit quod rēctissimē et pulcherrimē scrīpseram atque etiam assem mihi dedit quod optimē computāveram.” Sextus assem prōmit et parentibus ostendit.\n\nFabia: “Gaudēmus tē optimum discipulum esse. Nōn modo laudem, sed etiam dōnum meruistī.\n\nOstende nōbīs litterās tuās quae laudātae sunt ā magistrō!”\n\nSextus prōmit tabellam, quam suam esse putābat, eamque parentibus ostendit.\n\nCornēlius tabellam spectāns mīrātur litterās foedās ac diﬃcilēs lēctū esse. “Quidnam hoc est?” inquit, “Num magister hās litterās laudāvit?”\n\nSextus: “Immō ‘litterās foedās esse’ dīxit, sed hae litterae ā Mārcō scrīptae sunt. Iam intellegō Mārcum tabulās nostrās mūtāvisse inter pugnam. Is meam tabulam sūmpsit – mīror eum assem meum nōn sūmpsisse!”\n\nFabia: “Mārcus multōs nummōs ā patre suō dīvite accipit.”\n\nSextus: “Rēctē dīcis: is multōs nummōs habet – ac nescit numerāre pecūniam suam! Ego ūnum assem habeō ac sciō quattuor assēs facere sēstertium et quattuor sēstertiōs dēnārium.”\n\nCornēlius: “Quot assēs faciunt quattuor sēstertiī?”\n\nSextus: “Sēdecim scīlicet. Hoc idem magister nōs interrogāvit. Sed id quod mē interrogāvit multō diﬃcilius erat. Ecce exemplum: Quot dēnāriōs faciunt duodēquīnquāgintā sēstertiī? Tū mihi respondē, pater!”"

  "text": "Prīmā lūce Mārcus cum Dāvō Tūsculum ambulat. Dāvus nōn modo rēs Mārcī fert, sed etiam epistulam quam Iūlius ad magistrum scrīpsit.\n\nDāvus: “Ecce epistulam dominī ferō, quam tū ipse magistrō tuō trādēs.”\n\nMārcus: “Etiamne mercēdem fers, quam magistrō dēbēmus?”\n\nDāvus: “Pecūniam nōn ferō. Pater tuus mercēdem solvere nōn vult.”\n\nMārcus: “Ergō magister īrātus erit mihi.”\n\nDāvus: “Nōn tibi, sed patrī tuō īrātus erit. Dominus enim plānē scrībit ‘magistrum nihil tē docēre posse neque igitur mercēdem meruisse!’”\n\nMārcus: “Ita est ut scrībit pater: nihil discō ab illō magistrō!”\n\nMārcus et Dāvus incipiunt montem ascendere in quō situm est Tūsculum.\n\nMārcus: “Mīror quod oppidum nōn in valle, sed in monte situm est.”\n\nDāvus: “Oppida in montibus aediﬁcantur, quia facilius est montem dēfendere. Diﬃcile enim est hostibus montem ascendere.”\n\nMārcus frontem tergēns “Nōn sōlum hostibus” inquit “diﬃcile est. Ego semper fessus sum cum tandem ad lūdum advēnī. Ob eam causam necesse est in lūdō dormīre!”\n\nDāvus: “Id tē nōn excūsat. Posthāc necesse erit tē in lūdō vigilāre ac magistrō pārēre. Laetāre quod tibi licet in lūdum īre – mihi puerō nōn licēbat.”\n\nMārcus: “Sed tū servus es, Dāve.”\n\nDāvus: “In patriā meā servus nōn eram. Patria mea est Britannia.”\n\nMārcus: “Ergō puer barbarus erās.”\n\nDāvus: “Laetāre quod tū puer barbarus nōn es! Puerīs barbarīs nōn licet litterās et numerōs discere.”\n\nMārcus: “At puerīs barbarīs licet diēs tōtōs cum aliīs puerīs lūdere, per campōs et silvās errāre, in ﬂūminibus natāre, equōs regere, ferās occīdere, nec iīs necesse est ante lūcem surgere.”\n\nDāvus: “Puerī barbarī nōn tam beātē vīvunt quam tū putās. Multa mihi puerō erant oﬃcia, nec enim servum nec ancillam habēbat pater meus.”\n\nMārcus: “Quārē ex patriā tuā profectus es?”\n\nDāvus: “Parentēs meī ā mīlitibus Rōmānīs necātī sunt, quia Rōmānīs auxilium ferre nōlēbant.”\n\nMārcus: “Cūr Rōmānīs auxilium negābant?”\n\nMārcus: “Quia Rōmānī hostēs erant Britannōrum. Ego cum parentibus meīs habitābam in parvā domō apud magnam silvam in quā exercitus Britannōrum sē occultābat. Subitō mīlitēs Rōmānī domum nostram intrāvērunt ac patrem meum interrogāre coepērunt. Ille vērō cīvēs suōs, quī patriam suam ab hostibus Rōmānīs dēfendēbant, fallere nōlēbat neque ūllum verbum fēcit dē exercitū Britannōrum quī in silvīs occultābātur. Meīs oculīs vīdī patrem et mātrem ā saevīs mīlitibus occīdī. Ipse puer quīndecim annōrum cum cēterīs Britannīs captīs Rōmam missus sum et servus factus. Pater Iūliī mē sescentīs sēstertiīs ēmit.”"

  "title": "Colloquium 3",

  "text": "Ancilla cantat: “Lalla.” Quae est ancilla quae cantat? Ancilla quae cantat est Dēlia. Cūr Dēlia cantat? Dēlia cantat quia laeta est. Syra Dēliam audit. Syra et Dēlia sunt ancillae Aemiliae.\n\nSyra: “St, Dēlia! Puella mea dormit.”\n\nDēlia: “Puella tua? Quae est puella tua?”\n\nSyra: “Est Iūlia.”\n\nDēlia: “Iūlia nōn est tua puella, Iūlia puella Aemiliae est.”\n\nSyra: “Iūlia est fīlia Aemiliae — et mea quoque puella est.”\n\nDēlia: “Lalla, lalla.” Ancilla laeta cantat.\n\nSyra: “Ssst! Iūlia tē audit.” Syra īrāta est.\n\nDēlia: “Hahahae! Iūlia mē nōn audit, quia dormit. Lalla, lalla, lalla!” Dēlia rīdet et cantat. Iūlia Dēliam audit. Iam nōn dormit puella. Venit Aemilia, domina ancillārum. Dēlia iam nōn cantat neque rīdet, quia dominam videt. Aemilia, quae Iūliam nōn videt, Syram interrogat: “Ubi est Iūlia, Syra?”\n\nDēlia respondet: “Fīlia tua nōn hīc est, domina.”\n\nSyra: “Domina nōn tē, sed mē interrogat.” Aemilia interrogat Syram: “Cūr fīlia mea hīc nōn est?”\n\nSyra: “Iūlia hīc nōn est, quia dormit.” Iūlia, quae iam nōn dormit, Syram vocat: “Syra!” Syra puellam nōn audit, sed Aemilia eam audit.\n\nAemilia: “Iūlia nōn dormit; tē vocat.”\n\nSyra interrogat: “Quem Iūlia vocat?”\n\nAemilia respondet: “Tē.” Iūlia Aemiliam vocat: “Mamma! Mam-ma!” Iam Syra Iūliam audit.\n\nSyra: “Iūlia nōn mē, sed tē vocat, domina.” Iūlia venit et Aemiliam interrogat: “Cūr Syra nōn venit?”\n\nAemilia: “Nōn venit, quia tē nōn audit.”\n\nSyra: “Ō, hīc est mea Iūlia puella.”\n\nAemilia: “Mea puella est Iūlia, nōn tua. Sed cūr nōn dormit?” Nōn Syra, sed Iūlia respondet: “Quia ancilla cantat et rīdet.” Aemilia īrāta Syram interrogat: “Quae est ancilla improba quae cantat et rīdet?” Syra nōn respondet. Cūr nōn respondet Syra? Nōn respondet, quia dominam videt īrātam. Syra ancilla proba est.\n\nIūlia: “Iam nōn cantat ancilla neque rīdet.”\n\nAemilia: “Neque iam dormit mea puella!”"
 },
 {
  "id": "col4",
  "cap": 4,
  "title": "Colloquium 4",
  "personae": "Syra, Dāvus, Iūlius Dāvus, servus Iūliī, laetus est, quia nummum habet in sacculō suō. Syra eum laetum videt.",
  "text": "Syra: “Quid est, Dāve?”\n\nDāvus: “Ecce sacculus meus, Syra.” Syra sacculum Dāvī videt, nummum in sacculō nōn videt.\n\nSyra: “Vacuus est sacculus.”\n\nDāvus: “Nōn est. In sacculō meō est pecūnia.”\n\nSyra: “Quot nummī sunt in sacculō tuō?”\n\nDāvus: “Ūnus nummus. Ecce nummus meus.”\n\nSyra: “Ūnus tantum nummus? Nōn magna est pecūnia tua! In sacculō Mēdī nōn ūnus tantum, sed multī nummī sunt.”\n\nDāvus: “Sed meus est nummus quī in sacculō meō est.”\n\nSyra: “Quid? Nōnne Mēdī est pecūnia quae est in sacculō eius?” Dāvus, quī probus est servus, tacet neque Mēdum accūsat. Servus probus servum nōn accūsat.\n\nSyra: “Respondē, Dāve!”\n\nDāvus: “Mēdum interrogā!”\n\nSyra: “Sed is nōn adest. Ubi est Mēdus?” (Iūlius Mēdum vocat: “Mēde! Venī!”)\n\nDāvus: “Mēdus abest. Audī! Dominus eum vocat.” (Iūlius rūrsus Mēdum vocat: “Mē-de! Venī, improbe serve!”) Iam Syra dominum audit.\n\nSyra: “Cūr dominus īrātus est?” Dāvus nōn respondet.\n\nSyra: “Respondē, Dāve! Cūr īrātus est dominus?” Iūlius venit. Syra dominum īrātum — et baculum eius — ­videt.\n\nIūlius: “Ubi est Mēdus, Dāve?”\n\nDāvus: “Nōn est hīc.”\n\nIūlius: “Ō, servum improbum . . . !”\n\nSyra: “Quid est, domine? Nōnne servus probus est Mēdus?”\n\nIūlius: “Num probus est servus quī pecūniam dominī in sacculō suō habet?” Syra tacet. Dominus īrātus discēdit."
 },
 {
  "id": "col5",
  "cap": 5,
  "title": "Colloquium 5",
  "personae": "Iūlius, Dāvus, Mēdus In oppidō Tūsculō magnum forum est. In forō est templum antīquum. Iūlius in forō est cum quattuor servīs, neque Mēdus in iīs est. Ubi est Mēdus? Mēdus quoque in oppidō Tūsculō est, neque is in forō est cum dominō, sed sine dominō in templō. Mēdus sōlus est in magnō templō vacuō. Quid agit servus Iūliī in templō? Nummōs numerat.",
  "text": "Mēdus: “Quot nummī sunt in sacculō meō? Ūnus, duo, trēs, quattuor, quīnque, sex, septem, octō, novem, decem . . . . . nōnāgintā. Ecce nōnāgintā nummī: magna pecūnia mea est!” nōnāgintā = xc (90) “. . . mea est!” respondet templum vacuum.\n\nMēdus: “Quid? Num dominus adest?” “. . . adest” respondet templum vacuum. Sed sōlus est servus in templō. Nūllus dominus verba eius audit. Nōn in templō, sed in forō est Iūlius. Quid agit Iūlius Tūsculānus -a -um < Tūsculum in forō Tūsculānō? Dominus servum suum quaerit.\n\nIūlius imperat: “Quaere Mēdum, Dāve!”\n\nDāvus: “Ubi?”\n\nIūlius: “Quaere eum in templō!” Dāvus ab Iūliō discēdit. Iam Dāvus in templō est et Mēdum quaerit. Dāvus Mēdum in templō videt.\n\nDāvus: “Ō Mēde . . . !”\n\nMēdus: “St, tacē, Dāve! Tacē et discēde!”\n\nDāvus: “Dominus in oppidō est et tē quaerit. ­Īrātus est dominus.”\n\nMēdus: “Mēne quaerit dominus? Cūr mē quaerit?”\n\nDāvus: “Quia nummī eius in sacculō tuō sunt! Dominus nummōs suōs quaerit.”\n\nMēdus: “Iūlius meus dominus iam nōn est. Neque nummī eius in sacculō meō sunt.”\n\nDāvus: “Ō improbe serve!”\n\nMēdus: “Age, discēde, Dāve — et tacē! Improbus est servus quī servum accūsat.” Dāvus tacet, neque ab eō discēdit. Mēdus ex sacculō suō sūmit duōs nummōs.\n\nMēdus: “Ecce nummī tuī, probe serve!”\n\nDāvus: “Nōn meī sunt nummī, neque tuī, sed Iūliī sunt.” Dāvus nummōs nōn sūmit, et sōlus discēdit ex templō. In forō Iūlius Dāvum interrogat: “Estne Mēdus in templō?” Dāvus tacet.\n\nIūlius: “Respondē, Dāve! In templōne est servus meus?”\n\nDāvus respondet: “In templō est . . . servus tuus nūllus. (Mēdus servus tuus iam nōn est!)” Iūlius, quī prima tantum verba Dāvī audit, ex oppidō discēdit sine Mēdō. Mēdus sine dominō ex oppidō discēdit. templō-ne. . . ?"
 },
 {
  "id": "col6",
  "cap": 6,
  "title": "Colloquium 6",
  "personae": "Mēdus, Iūlius, Dāvus, Syrus, Lēander, Ursus Via Latīna est longa, sed Mēdus, quī viā Latīnā Tūsculō Rōmam ambulat, fessus nōn est, nam is ambulat ad Lȳdiam amīcam, quae Rōmae habitat. Lȳdia Mēdum amat et ab eō amātur.",
  "text": "Mēdus cantat: “Nōn via longa est Rōmam . . .” Mēdus autem sōlus ambulat; itaque id quod cantat ā nūllō audītur. Via quae est inter Tūsculum et vīllam Iūliī nōn tam longa est quam via Latīna, sed servī quattuor quī Tūsculō ad vīllam ambulant fessī sunt, quia lectīcam et saccōs portant. Duo servī, Dāvus et Ursus, lectīcam cum dominō portant. Saccōs portant Syrus et Lēander. Iūlius, quī lectīcā vehitur, servōs videt fessōs et imperat: “Pōnite lectīcam in viā, servī!” Servī fessī lectīcam in viā pōnunt neque iam ambulant. Syrus et Lēander saccōs pōnunt.\n\nDāvus: “Phū! Via longa est ab oppidō ad vīllam!”\n\nSyrus: “Nōn longa est via, sed saccī magnī sunt.”\n\nLēander: “Tuus saccus est parvus. Ecce saccus meus magnus! Dāvus autem lectīcam cum dominō portat, nōn saccum.”\n\nSyrus: “Dāvus nōn sōlus, sed cum Ursō lectīcam portat.”\n\nUrsus: “Neque vacua est lectīca! Dominus nōn tam parvus est quam saccus tuus, Syre.” Iūlius, quī Dāvum fessum videt, imperat: “Iam saccum Syrī portā, Dāve! Urse, sūme saccum Lēandrī! Agite, Syre et Lēander, lectīcam portāte!” Servī pārent: Dāvus et Ursus saccōs sūmunt, lectīcam sūmunt Syrus et Lēander.\n\nIūlius imperat: “Ambulāte, servī!” Iam rūrsus ambulant servī. Syrus et Lēander lectīcam cum dominō portant, et saccī portantur ab Ursō et Dāvō: Ursus saccum magnum portat, saccus parvus ā Dāvō portātur. Iam Dāvus nōn tam fessus est quam Syrus.\n\nSyrus: “Phū! Via longa est ab oppidō ad vīllam!” Dāvus ridet.\n\nUrsus (ad Dāvum): “Cūr nōn ambulat dominus post lectīcam?”\n\nDāvus: “Dominus fessus vehitur, nōn ambulat, quia nōn est servus.”\n\nUrsus: “Et servī fessī ambulant, nōn vehuntur, quia dominī nōn sunt.”\n\nLēander: “Num fessus est dominus, quī lectīcā vehitur?”\n\nDāvus: “Tacē , Lēander! Dominus tē audit.”\n\nIūlius stertit: “Ssst-rrrch, ssst-rrrch . . . !”\n\nLēander: “Ecce dominus iam dormit, quia longā viā fessus est! Is mē nōn audit.” Verba servōrum ā Iūliō nōn audiuntur, nam dominus fessus iam dormit in lectīcā! Dominus quī dormit ā servīs nōn timētur."
 },
 {
  "id": "col7",
  "cap": 7,
  "title": "Colloquium 7",
  "personae": "Dōrippa, Lȳdia, Mēdus Dōrippa, quae amīca Lȳdiae est, amīcam suam interrogat: “Quis est amīcus tuus?”",
  "text": "Lȳdia respondet: “Amīcus meus est Mēdus.”\n\nDōrippa: “Estne vir Rōmānus?”\n\nLȳdia: “Nōn Rōmānus, sed Graecus est amīcus meus.”\n\nDōrippa: “Habitatne Rōmae?”\n\nLȳdia: “Mēdus nōn Rōmae, sed prope Tūsculum habitat.”\n\nDōrippa: “Quid est Tūsculum?”\n\nLȳdia: “Tūsculum est oppidum in viā Latīnā nōn procul ā Rōmā. Mēdus in vīllā prope Tūsculum habitat.”\n\nDōrippa: “Vīllamne habet amīcus tuus?”\n\nLȳdia: “Nōn Mēdus, sed dominus eius habet vīllam.”\n\nDōrippa: “Āh! Servus est amīcus tuus! Meus amīcus, Lepidus, nōn est servus. Pater eius vīllam habet et magnam pecūniam.”\n\nLȳdia: “Mēdus bonus servus est et bonus amīcus, quī mē sōlam amat.”\n\nDōrippa: “Cūr amīcus tuus Rōmam ad tē nōn venit?” Lȳdia nōn respondet.\n\nDōrippa: “Quia in vīllā multae sunt ancillae fōrmōsae . . . ”\n\nLȳdia: “Quid?”\n\nDōrippa: “Amīcus tuus nōn sōlum tē, sed etiam ancillam amat!”\n\nLȳdia: “Tacē, Dōrippa!” Pulsātur ōstium.\n\nLȳdia: “Intrā!” Mēdus ōstium aperit et intrat.\n\nMēdus: “Salvē, mea Lȳdia! Ecce amīcus tuus, quī sōlus Rōmam ad tē venit.”\n\nLȳdia: “Ō amīce, salvē!” Mēdus laetus ad Lȳdiam adit et eī multa ōscula dat. Lȳdia verbīs et ōsculīs Mēdī dēlectātur.\n\nLȳdia: “Ecce Dōrippa. Salūtā eam!” Mēdus sē vertit ad Dōrippam eamque salūtat: “Salvē, Dōrippa!” Dōrippa Mēdum salūtat: “Salvē, serve!” Mēdus Lȳdiam interrogat: “Estne Dōrippa ancilla tua?”\n\nLȳdia: “Dōrippa nōn est ancilla, neque amīcus eius servus est.”\n\nMēdus: “Neque tuus amīcus servus est, Lȳdia.”\n\nLȳdia: “Quid? Ubi est dominus tuus?”\n\nMēdus: “Iūlius in vīllā est apud servōs suōs — neque is iam meus dominus est!” Lȳdia laeta sē vertit ad Dōrippam: “Audī, Dōrippa: amīcus meus iam servus nōn est.”\n\nDōrippa: “Neque ancilla est amīca tua!” Dōrippa īrāta per ōstium exit. In viā ante ōstium videt Lepidum, amīcum suum. Lepidus autem Dōrippam nōn salūtat neque ab eā salūtātur, nam is cum ancillā fōrmōsā in viā ambulat! Lepidus ancillae ōsculum dat! Dōrippa discēdit. In oculīs eius lacrimae sunt."
 },
 {
  "id": "col8",
  "cap": 8,
  "title": "Colloquium 8",
  "personae": "Iūlius, Aemilia, Flōra, Iūlia Iūlius Iūlī! (voc) noster -tra -trum = meus et tuus Ecce Iūlius et Aemilia in forō Tūsculānō. Forum plēnum est virōrum et fēminārum quī emunt aut vēndunt, in hīs Flōra, puella fōrmōsa, quae rosās vēndit. Aemilia rosās videt.",
  "text": "Aemilia: “Aspice rosās, Iūlī!”\n\nIūlius: “Quās rosās?”\n\nAemilia: “Quās illa puella vēndit.” Puellam digitō mōnstrat. Iūlius puellam aspicit.\n\nIūlius: “Fōrmōsa est puella.”\n\nFlōra clāmat: “Ecce rosae! Emite rosās!” Aemilia cum Iūliō adit ad Flōram, quae eōs salūtat: “Salvēte, domine et domina! Aspicite hās rosās!”\n\nAemilia: “Ō, quam pulchrae sunt rosae tuae!”\n\nIūlius: “Hortus noster plēnus est rosārum.”\n\nAemilia: “Sed illae rosae quae sunt in hortō nostrō nōn tam pulchrae sunt quam hae.”\n\nIūlius: “Neque fīlia nostra tam pulchra est quam haec puella.”\n\nAemilia: “Tacē, Iūlī! Rosās aspice, nōn puellam!” Flōra ad Iūlium rīdet. Aemilia nōn rīdet.\n\nIūlius ūnam rosam sūmit et puellam interrogat: “Quantum est pretium huius rosae?”\n\nAemilia: “Nōn ūnam tantum, sed multās rosās eme, Iūlī!” Flōra Iūliō et Aemiliae decem rosās ostendit: “Ecce decem rosae. Pretium hārum rosārum est duo sēstertiī tantum.”\n\nIūlius: “Id magnum pretium nōn est. Ecce duo sēstertiī.” Iūlius Flōrae duōs sēstertiōs dat. Puella nummōs sūmit et Iūliō decem rosās vēndit. Iūlius rosās sūmit et Aemiliae dat.\n\nIūlius: “Accipe hās rosās ā virō tuō, quī tē amat, Aemilia!” Aemilia laeta rosās accipit, et virō suō ōsculum dat. Iūlius et Aemilia ad vīllam suam adveniunt et ā Iūliā laetā salūtantur: “Salvēte, pater et māter!” Iūlius et Aemilia: “Salvē, Iūlia!” Iūlia, quae venit ex hortō, decem rosās pulchrās ante sē tenet.\n\nIūlia: “Ecce rosae. Nōnne pulchrae sunt?”\n\nAemilia: “Ō, quam pulchrae sunt rosae tuae! Unde sunt illae rosae?”\n\nIūlia: “Ex hortō sunt. Accipe rosās, mamma!” Iūlia Aemiliae decem rosās dat.\n\nIūlia: “Iam nōn meae, sed tuae sunt.” Aemilia laeta rosās accipit, et filiae suae ōsculum dat.\n\nIūlia: “Pretium decem rosārum nōn est ūnum ōsculum, sed decem!”\n\nIūlius: “Id magnum pretium est!” Aemilia rīdet et fīliae suae decem ōscula dat.\n\nIūlius: “Māter tua aliās decem rosās habet. Ecce rosae eius.” Ex lectīcā decem rosās sūmit et Iūliae ostendit. Illae rosae iam nōn tam pulchrae sunt quam in forō, quia in aquā nōn sunt.\n\nIūlia rosās aspicit et interrogat: “Unde sunt illae rosae?”\n\nIūlius: “Ex forō Tūsculānō, ubi puella fōrmōsa rosās vēndit.”\n\nIūlia: “Quantum est pretium illārum rosārum?”\n\nIūlius: “Duo sēstertiī — et ūnum tantum ōsculum!”\n\nIūlia: “Duo sēstertiī? Id est magnum pretium! In hortō nostrō sunt mīlle rosae, quārum pretium nūllum est.”\n\nAemilia: “Num decem ōscula nūllum est pretium?”\n\nIūlia: “Cūr pater, quī hortum habet plēnum rosārum, aliās rosās emit ā puellā Tūsculānā? Nōnne rosae hortī nostrī tam pulchrae sunt quam eae quae tantō pretiō in forō emuntur?” Iūlius Aemiliam aspicit, quae nōn respondet.\n\nIūlius: “Respondē, Aemilia! Iūlia tē interrogat.”\n\nAemilia: “Sine aquā rosae nōn tam pulchrae sunt . . .” Iūlia Iūlium interrogat: “Nōnne fīlia tua tam pulchra est quam puella quae rosās vēndit?” Aemilia Iūlium aspicit, quī nōn respondet.\n\nAemilia: “Respondē, Iūlī! Iūlia tē interrogat.”\n\nIūlius: “Fīlia mea tam pulchra est quam rosa . . .”\n\nIūlia: “Num illa puella tam pulchra est?” Iūlius tacet.\n\nAemilia: “Age, sūme rosās meās vīgintī, Iūlia, eāsque in aquā pōne!” Iūlia vīgintī rosās sūmit et cum iīs abit.\n\nIūlius: “Pretium decem rosārum nōn est ūnum ōsculum tantum, sed decem ōscula!” Aemilia rīdet et Iūliō quoque decem ōscula dat."
 },
 {
  "id": "col9",
  "cap": 9,
  "title": "Colloquium 9",
  "personae": "Faustīnus, Rūfus Faustīnus, pāstor Iūliī, abest ab ovibus suīs, quia ovem nigram in silvā quaerit. Ovēs sine pāstōre in campō errant. Ecce Faustīnus cum cane suō ex silvā venit. Pāstor ovem nigram umerīs portat.",
  "text": "Canis lātrat: “Baubau!” Ovēs canem audiunt et ad pāstōrem suum currunt. Faustīnus ovem nigram in terrā pōnit sub arbore.\n\nOvis bālat: “Bābā!”\n\nPāstor ovēs numerat: “Ūna, duae, trēs, quattuor, quīnque. . . .” Dum ovēs ā pāstōre numerantur, vir īrātus accurrit. Est Rūfus, quī parvam vīllam cum hortō prope silvam habet.\n\nRūfus īrātus baculum ante sē tenet et clāmat: “Ō improbe pāstor! Ovēs tuae in hortō meō sunt!”\n\nFaustīnus: “Quid agunt ovēs meae in hortō tuō?”\n\nRūfus: “Rosās meās edunt.”\n\nFaustīnus: “Ovēs nōn rosās, sed herbam edunt. Neque ovēs meae ā pāstōre suō abeunt. Quot ovēs sunt in hortō tuō?”\n\nRūfus: “Quattuor.”\n\nFaustīnus: “Nōn meae sunt illae ovēs. Ecce ovēs meae, quae apud mē sunt. Numerus eārum est centum. Age, numerā eās!” Rūfus ovēs aspicit, neque eās numerat.\n\nRūfus: “Hīc centum ovēs nōn sunt.”\n\nFaustīnus: “Sunt centum. Nūlla ovis abest.” mordēre = dentibus petere Ecce autem quattuor ovēs albae accurrunt! Post eās venit parvus canis īrātus, quī ūnam ovem dentibus petit.\n\nRūfus: “Ecce Persa, canis meus, quī cum ovibus tuīs venit.”\n\nFaustīnus: “Vocā canem tuum! Ovem meam mordet!”\n\nRūfus: “Persa, venī!” Canis īrātus nōn venit, sed ovem mordet. Ovis, quae mordētur, bālat: “Bābaā!” Iam canis pāstōris parvum canem videt et ad eum currit. Persa sē vertit ab ove ad canem pāstōris, quī ante eum cōnsistit et dentēs ostendit.\n\nCanis pāstōris lātrat: “Baubaubau!” Parvus canis, quī magnum canem timet, nōn lātrat, sed ululat: “Uhuhū!” et ad dominum suum currit. Ovēs quattuor, quae canem parvum iam nōn timent, laetae ad pāstōrem adeunt et ad eum bālant.\n\nRūfus: “Ovēs dominum suum amant. Nōnne tuae sunt?”\n\nFaustīnus: “Nūllae ovēs meae iam sunt in hortō tuō.”\n\nRūfus: “Sed vestīgia ovium tuārum in hortō meō sunt.”\n\nFaustīnus: “Et in collō ovis meae sunt vestīgia dentium canis tuī! Canis ille parvus tam malus est quam lupus!”\n\nRūfus: “Immō bonus canis est Persa. Canis meus ovēs nōn ēst.”\n\nFaustīnus: “Neque ovēs meae rosās edunt.”"
 },
 {
  "id": "col10",
  "cap": 10,
  "title": "Colloquium 10",
  "personae": "Iūlia, Syra Iūlia et Syra in hortō ambulant cum Margarītā, cane Iūliae parvā et crassā. Sōl lūcet in caelō sine nūbibus. Iūlia laeta canit. Canis eam canere audit et caudam movet. Ecce avis ante canem volat. Canis avem ante sē volāre videt et currit, sed avis iam procul ā cane est. Canis, quae avem capere vult neque potest, īrāta lātrat: “Baubau!”",
  "text": "Iūlia canem suam vocat: “Margarīta! Venī!” Canis cōnsistit et ad Iūliam, dominam suam, currit.\n\nSyra: “Necesse nōn est canem vocāre, neque enim canis avēs capere potest.”\n\nIūlia: “Sed avēs canem timent.” Canis iam fessa iacet ad pedēs Iūliae. Syra canem crassam in herbā iacēre videt eamque spīrāre audit.\n\nSyra: “Canem tuam crassam nūlla avis timet.”\n\nIūlia: “Margarīta nōn est crassa!” Canis aspicit Iūliam et caudam movet.\n\nIūlia: “Sed cūr nōn canunt avēs? Quid timent?”\n\nSyra: “Nōn canem fessam, sed avem feram timent.”\n\nIūlia: “Quam avem feram?” Syra magnam avem quae suprā hortum volat digitō mōnstrat: “Ecce avis fera quae ā parvīs avibus timētur.” Iūlia caelum aspicit et magnam avem suprā sē volāre videt. Avis magnīs ālīs sustinētur, neque Iūlia ālās movērī videt.\n\nIūlia: “Quae est illa avis?”\n\nSyra: “Est aquila, quae cibum quaerit.”\n\nIūlia: “In caelō cibum reperīre nōn potest.”\n\nSyra: “Nōn in caelō, sed in terrā cibum quaerit. Aquila enim bonōs oculōs habet et parva animālia procul vidēre potest. Aquila est avis fera, quae aliās avēs capit et ēst.”\n\nIūlia: “Avis improba est aquila!”\n\nSyra: “Magna aquila etiam parvam puellam capere potest et ad nīdum suum portāre.”\n\nIūlia: “Quid? Mēne aquila portāre potest?” Syra Iūliam aspicit: puella tam crassa est quam canis sua. Syra rīdet neque respondet. Iūlia eam rīdēre nōn videt, nam caelum aspicit neque iam aquilam videt.\n\nIūlia: “Iam abest aquila.”\n\nSyra: “Est apud nīdum suum.”\n\nIūlia: “Ubi est nīdus aquilae?”\n\nSyra: “Procul in monte est, quō nēmō potest ascendere. Puerī nīdum aquilae reperīre nōn possunt.”\n\nIūlia: “Sed aliōs nīdōs reperīre possunt. Ecce puerī quī nīdōs quaerunt in arboribus.” Iūlia Mārcum et Quīntum in umbrā inter arborēs errāre et nīdōs quaerere videt. Iūlia et Syra in sōle sunt.\n\nSyra: “Venī in umbram, Iūlia!” Iūlia canem, quae ad pedēs eius iacet, pede pulsat: “Age, curre, Margarīta crassa!” Syra canem aspicit, et rīdet. Etiam Iūlia rīdet. Margarīta ante Iūliam currit ad parvam arborem. Canis caudam movet et lātrat: “Baubau!” Ecce avis perterrita ex arbore volat. Iūlia et Syra cōnsistunt ante arborem, unde parvae vōcēs audiuntur: “Pīpīpī, pīpīpī!” Iūlia Syram interrogat: “Quid hoc est?” Syra rāmōs et folia arboris movet et inter rāmōs parvum nīdum videt. Syra nīdum prope aspicit.\n\nSyra: “Ecce nīdus in quō quīnque pullī sunt. Aspice, Iūlia!” Iūlia nīdum aspicit, neque pullōs videt, quia nimis parva est. Iūlia, quae pullōs aspicere vult, imperat: “Impōne mē in umerōs tuōs, Syra!”\n\nSyra: “Umerī meī tē portāre nōn possunt.”\n\nIūlia: “Sustinē mē tantum!” Syra Iūliam ā terrā sustinet. Iam puella pullōs videt in nīdō. Pullī autem tacent neque iam pīpiant.\n\nIūlia: “Ō, quam parvī sunt! Cūr nōn pīpiant neque sē movent?”\n\nSyra: “Quia perterritī sunt; tē enim vident.”\n\nIūlia: “Pullī mē vidēre nōn possunt, neque enim oculōs aperiunt.” Syra fessa puellam crassam in terrā pōnit.\n\nSyra: “Sed vōcem tuam audiunt pullī — et māter pullōrum tē nōn sōlum audit, sed etiam videt. Audī: avis pīpiat, quia ad nīdum suum adīre nōn audet.” Audītur vōx Mārcī: “Venī, Quīnte! In hāc arbore nīdus est.”\n\nIūlia: “Ō, Mārcus nīdum videt.”\n\nSyra: “Discēde ab arbore, Iūlia! Mārcus alium nīdum videt, hunc nīdum reperīre nōn potest.” Iūlia et Syra cum cane ab arbore discēdunt. Avis eās discēdere videt et ad nīdum suum volat. Pullī, quī mātrem suam venīre vident, rūrsus pīpiant: “Pīpīpī!” Pullī cibum exspectant. Avis pullīs suīs cibum dat. pullus pīpiat: “pīpīpī!” māter (nōm) mātrem (acc)"
 },
 {
  "id": "col11",
  "cap": 11,
  "title": "Colloquium 11",
  "personae": "Sextus, Fabia māter mātris f pater patris m",
  "text": "Mārcus: “Pater meus x equōs habet.” M. dīcit ‘patrem suum x equōs habēre’ magnam familiam = multōs servōs Cornēlius et Fabia, quī Tūsculī habitant, ūnum fīlium, Sextum, habent. Sextus Tūsculī apud mātrem suam est, sed Cornēlius abest. Fabia virum suum exspectat.\n\nSextus mātrem interrogat: “Cūr nōn venit pater?”\n\nFabia: “Rōmā Tūsculum via longa est.”\n\nSextus: “Nōn longa est via. Atque bonum equum habet pater.”\n\nFabia: “Equus bonus est. Cornēlius equum suum amat neque eum verberat; itaque equus nōn currit, sed ambulat.”\n\nSextus: “Estne sōlus pater?”\n\nFabia: “Nōn sōlus, nam equus est apud eum.”\n\nSextus: “Cūr nūllus servus apud patrem meum est?”\n\nFabia: “Quia pater tuus ūnum tantum equum habet, neque ūnus equus duōs hominēs Tūsculō Rōmam vehere potest.”\n\nSextus: “Cūr pater meus ūnum tantum equum habet? Pater Mārcī multōs equōs habet.”\n\nFabia: “Quis dīcit ‘Iūlium multōs equōs habēre’?”\n\nSextus: “Mārcus id dīcit.”\n\nFabia: “Quot equōs habet Iūlius?”\n\nSextus: “Mārcus dīcit ‘patrem suum decem equōs fōrmōsōs habēre.’ Cūr pater meus decem equōs nōn habet?”\n\nFabia: “Quia pater tuus nōn tam pecūniōsus est quam pater Mārcī. Iūlius magnam familiam habet et magnam vīllam.”\n\nSextus: “Quot servōs habet Iūlius?”\n\nFabia: “Interrogā Mārcum!”\n\nSextus: “Mārcus dīcit ‘servōs eius numerārī nōn posse!’”\n\nFabia: “Iūlius habet centum servōs, ut ipse dīcit — sed Mārcus centum numerāre nōn potest!” Fabia Mārcum puerum stultum esse putat.\n\nSextus: “Mārcus nōn potest centum servōs numerāre, sed decem equōs numerāre potest! Cūr Iūlius, quī decem equōs habet, patrī meō equum nōn dat? Nōnne Iūlius amīcus patris est?”\n\nFabia: “Est. Sed Iūlius multōs amīcōs habet.”\n\nSextus: “Quid Iūlius nōn habet?”\n\nFabia: “Cornēlius quoque multōs habet amīcōs. Pecūniōsus nōn est vir meus, sed bonus vir, bonus pater, bonus amīcus est.”\n\nSextus: “Etiam Iūlius bonus pater est. Cum revenit ex oppidō, līberīs suīs multa dōna dat.”\n\nFabia: “Quī magnam pecūniam habet, multa et magna dōna emere potest.”\n\nSextus: “Nec sōlum līberīs suīs, sed etiam mātrī eōrum magna dōna dat. Māter Mārcī multa ōrnāmenta accipit ā virō suō. Mārcus dīcit ‘mātrem suam et gemmīs et margarītīs et ānulīs pulchrīs ōrnārī nec aliam fēminam tam fōrmōsam esse . . .’”\n\nFabia: “Num māter Mārcī sine ōrnāmentīs tam fōrmōsa est quam māter tua?”\n\nSextus: “Nūlla fēmina tam pulchra est quam māter mea!”\n\nFabia verbīs fīliī dēlectātur eumque interrogat: “Quis id dīcit?” Sextus nōn respondet, nam equum accurrere audit.\n\nSextus: “Audī! Pater venit. Equus eius nōn ambulat, sed currit.”\n\nFabia: “Quid est? Cūr equus currit? Age, exī ante ōstium!” Exit Sextus. Cūr equus Cornēliī currit? Vidē colloquium duodecimum! dōnum -ī n = id quod datur duo-decimus -a -um = xii. (12.)"
 },
 {
  "id": "col12",
  "cap": 12,
  "title": "Colloquium 12",
  "personae": "Mīles, Cornēlius, Mēdus. Cornēlius viā Latīnā Rōmā Tūsculum it. In viā Latīnā mīles Rōmānus, quī ipse Rōmā Tūsculum it, Cornēlium post sē venīre audit. Mīles, quī in sōle ambulat, fessus est, quia arma gravia fert. Cornēlius dominus, quī equō vehitur, nōn est fessus, sed fessus est equus quī dominum gravem vehit. Itaque equus Cornēliī nōn currit, sed ambulat. Cornēlius nōn verberat equum suum fessum. Mīles Cornēlium salūtat: “Salvē, domine! Equus tuus bonus est, nec sōlum tē, sed etiam mē portāre potest!” Cornēlius virum armātum timet, quia ipse arma nōn fert; itaque mīlitem equum ascendere iubet: “Ascende! Hīc post mē sedē!” Mīles equum ascendit. Iam duo hominēs ūnō equō vehuntur: mīles sedet post Cornēlium, Cornēlius ante mīlitem sedet. Equus Cornēliī, quī duōs virōs gravēs Tūsculum vehere nōn potest, īrātus hinnit: “Hihihī!” atque in viā cōnsistit.",
  "text": "Cornēlius equum ambulāre iubet: “Ambulā, eque!” Equus autem rūrsus hinnit neque sē movet. Mīles equum hinnīre audit et Cornēlium interrogat: “Cūr nōn ambulat equus?”\n\nCornēlius respondet: “Quia ūnum tantum hominem vehere potest.”\n\nMīles: “Improbus est equus. Verberā eum!”\n\nCornēlius: “Equus meus probus est; eum verberāre necesse nōn est.” Cornēlius equum suum amat neque eum verberāre vult.\n\nMīles īrātus clāmat: “Age, curre, eque!” atque equum gladiō verberat! Equus perterritus currit, atque mīles ad terram cadit! Caput eius viam pulsat. Cornēlius equum cōnsistere iubet, sed equus perterritus Tūsculum currit. Sextus, fīlius Cornēliī, quī ex ōstiō viam spectat, equum accurrere videt ac perterritus ab eō fugit. Equus cum dominō ante ōstium cōnsistit. Mīles autem quiētus in viā iacet ut mortuus. Dē fronte eius sanguis fluit. Dum mīles illīc in sōle iacet, Mēdus advenit. Unde venit Mēdus? Is Tūsculō venit et viā Latīnā Rōmam ambulat.\n\nMēdus laetus canit: “Nōn via longa est Rōmam . . . ” Hīc Mēdus hominem in viā iacēre videt et ante eum cōnsistit.\n\nMēdus sē interrogat: “Quis est hic vir quī in mediā viā iacet?” et ipse respondet: “Est mīles, nam armātus est.” Servus caput mīlitis manū sustinet et, dum sanguinem dēterget, interrogat eum: “Quid est, amīce? Doletne caput?” in mediā viā = in mediā parte viae “Salvē!” dīcit is quī advenit “Valē!” dīcit is quī discēdit Vōx Mēdī ā mīlite nōn audītur. Mīles sē nōn movet, nec Mēdus eum spīrāre audit. Ergō Mēdus mīlitem mortuum esse putat.\n\nSed ecce mīles oculōs aperit et parvā vōce dīcit: “Aquam . . .!” Mēdus, quī mīlitem vīvere gaudet, ex parvō rīvō aquam arcessit et mīlitī dat. Mīles laetus ē manū Mēdī bibit et ‘aquam bonam esse’ dīcit: “Aqua bona est. Iam necesse nōn est mē sustinēre, amīce!”\n\nMēdus: “Doletne caput?”\n\nMīles: “Nōn male dolet . . .”\n\nMēdus: “Venī Rōmam ad medicum!”\n\nMīles: “Id necesse nōn est — sed necesse est mē Tūsculum īre: illīc enim dux exercitūs in castrīs mē exspectat.”\n\nMēdus: “Rōmae mē exspectat amīca mea.”\n\nMīles: “Id mē dēlectat. Mē quoque puella Rōmāna amat et Rōmam vocat . . . Sed iam dux mē vocat in castra. Bonus mīles ducī suō pāret, ut bonus servus dominō suō. Ergō valē, bone serve, ac bene ambulā!”\n\nMēdus rīdet et respondet: “Valē, bone mīles!” Mīles, quī ducem exercitūs timet, Mēdum relinquit et Tūsculum ad exercitum ambulat. Mīles ducī suō pāret. Mēdus, quī Rōmam ambulat ad amīcam suam, mīlitem stultum esse putat. Mēdus dominō suō nōn pāret."
 },
 {
  "id": "col13",
  "cap": 13,
  "title": "Colloquium 13",
  "personae": "Medicus, Syrus, Iūlius, Aemilia, Syra Hōra octāva est. Dum Quīntus in lectō iacet in cubiculō suō, Medicus in ātriō Iūlium exspectat. Servus adest Syrus. Iūlius ex cubiculō Quīntī venit.",
  "text": "Medicus interrogat: “Dormitne puer?” “Nōn dormit” respondet Iūlius, “Quīntus dormīre nōn potest, quod iam nōn modo pēs eius dolet, sed etiam bracchium.”\n\nMedicus: “Pēs tantum aegrōtat.”\n\nIūlius: “Cum pēs aegrōtat, necesse nōn est vēnam bracchiī aperīre. Hōc modō pēs aeger nōn sānātur.”\n\nMedicus: “Sanguis ā corde per vēnās fluit in tōtum corpus hūmānum, ut dīcit Hippocratēs . . .” Hīc intrat Aemilia cum Syrā ancillā, quae pōculum fert plēnum sanguinis.\n\nAemilia: “Ecce sanguis Quīntī in pōculō. In corpore eius iam nōn multum sanguinis est, ut ostendit color eius albus. Fīlius noster nunc aegrior est quam erat!”\n\nMedicus: “Sed faciēs eius nimis rubra erat. Puer crassus . . .”\n\nAemilia: “Num fīlius meus puer crassus est?”\n\nSyra (parvā vōce ad Aemiliam): “Is nōn est tam crassus quam ipse medicus!” Sed ea verba ā crassō medicō nōn audiuntur. Hippocratēs -is m\n\nMedicus: “Nōn nimis crassus est puer. Homō autem crassus, cui color faciēī ruber est, nimis multum sanguinis habet . . .”\n\nIūlius: “. . . ut dīcit Hippocratēs!”\n\nAemilia: “Quis est Hippocratēs?”\n\nMedicus: “Est medicus Graecus clārissimus. Ille dīcit ‘hominem crassum ac rubrum nimis multum sanguinis habēre in corpore’.”\n\nIūlius: “Ergō in corpore tuō crassō nimis multum est sanguinis!”\n\nMedicus: “Num crassum est corpus meum?”\n\nIūlius: “Crassius est quam corpus Quīntī. Atque ecce faciēs tua rubra. Sānā tē ipsum, medice!”\n\nMedicus: “Quō modō?”\n\nIūlius: “Sūme cultrum ac vēnam aperī tuam!” Rīdent Aemilia et Syra. Item Syrus rīdēre incipit.\n\nMedicus (īrātus): “Servus tuus mē rīdet!” Iūlius Syrum tacēre iubet: “Tacē, Syre! Exī atque equum medicī dūe ante ōstium!” Exit Syrus. Vōx Quīntī audītur ex cubiculō: “Venī, māter!”\n\nIūlius: “Audī, Aemilia! Quīntus tē vocat. Estne sōlus in cubiculō?” “Nōn est” respondet Aemilia, “Dēlia est apud eum. Quīntus gaudet medicum abesse, et mē exspectat.”\n\nMedicus: “Cūr mē abesse gaudet?”\n\nAemilia: “Quia tē atque cultrum tuum metuit. Dīcit ‘tē esse malum medicum!’”\n\nMedicus: “Quid? Ille puer id dīcere audet?”\n\nSyra (parvā vōce in aurem Aemiliae): “Nōn puer tantum id dīcit!”\n\nIūlius: “Nōnne malus est medicus quī hominēs aegrōs nōn sānat, sed aegriōrēs facit?”\n\nMedicus: “Quī medicus id facit?” Iūlius medicum aspicit nec respondet.\n\nQuīntus rūrsus mātrem vocat: “Māter! Ma-ā-ter!”\n\nIūlius: “Ī ad Quīntum, Aemilia, atque iubē eum dormīre! Hōra octāva est.” Aemilia abit ad fīlium suum aegrum.\n\nMedicus: “Iam tempus est mē abīre.”\n\nIūlius: “Nēmō tē hīc tenet.”’\n\nMedicus: “Ubi est equus meus?”\n\nIūlius: “Iam stat ante ōstium.” Iūlius cum medicō ante ōstium exit. Illīc stat equus medicī, quī ā Syrō tenētur. Medicus equum ascendit.\n\nMedicus: “Valē, domine!”\n\nIūlius: “Valē, medice! Necesse nōn est tē post hunc diem revenīre.” Medicus sōlus discēdit."
 },
 {
  "id": "col14",
  "cap": 14,
  "title": "Colloquium 14",
  "personae": "Aemilia, Iūlius vesperī (adv) ↔ māne Vesper est. Aemilia in peristȳlō est cum Iūliō.",
  "text": "Aemilia: “Venī mēcum in hortum, Iūlī. Dēlectat mē tēcum ambulāre in hortō nostrō.”\n\nIūlius: “Mē quoque id dēlectat. Sed sōl iam nōn lūcet. Vesper est.”\n\nAemilius: “Cum sōl lūcet, nimis calidus est āēr in hortō. Merīdiē in sōle ambulāre mē nōn dēlectat, sed vesperī āēr nec nimis calidus nec nimis frīgidus est.”\n\nIūlius: “Sed obscūrus est hortus vesperī. Rosae vidērī nōn possunt.”\n\nAemilia: “Hāc nocte hortus obscūrus nōn est, nam lūna et stēllae lūcent. Ecce magna lūna quae suprā montem ascendit.” Lūnam spectāns Iūlius “Lūna plēna est hāc nocte” inquit “quae est ante kalendās Iūniās. Sed rēs male illūstrantur lūce lūnae. Rosārum color vidērī nōn potest.”\n\nAemilia: “Lūx lūnae hortum nostrum pulchrum etiam pulchriōrem facit. Age, venī mēcum, Iūlī!” Aemilia manum Iūliī capit eumque sēcum dūcit in hortum. In hortō Aemilia “Nōnne pulchra est lūna?” inquit, “Est ut faciēs hūmāna. Ecce ōs eius quod ad tē rīdet.” Iūlius prīmum lūnam spectat, deinde faciem Aemiliae rīdentem: “Ad mē” inquit “nōn sōlum ōs lūnae rīdet, sed etiam ōs tuum rubrum ut rosa.” Aemilia rīdēns “Hāc lūce” inquit “color rosārum vidērī nōn potest — num ōris meī color vidērī potest?” Iūlius rūrsus Aemiliam aspiciēns “Etiam sine colōre” inquit “faciēs tua fōrmōsa est, Aemilia: oculī tuī ut stēllae lūcent et dentēs ut margarītae! Atque collum tuum album bene vidētur. Ō, quam fōrmōsum est collum tuum!” Iūlius collō Aemiliae ōsculum fert.\n\nAemilia: “Ō Iūlī! Verba tua mē dēlectant.”\n\nIūlius: “Ubi sunt margarītae quibus collum tuum ōrnārī solet?”\n\nAemilia: “Nōnne fōrmōsum est collum meum sine margarītīs?”\n\nIūlius: “Nōn tam fōrmōsum quam cum margarītīs! Margarītae tē, fēminam pulchram, etiam pulchriōrem faciunt. Ubi sunt cētera ōrnāmenta tua?”\n\nAemilia: “Ecce gemmae in auribus et ānulī in digitīs.”\n\nIūlius: “Sed collum tibi nūdum est. Ubi sunt eae margarītae, Aemilia?” Iūlius terram ante Aemiliam spectat.\n\nAemilia: “Sunt in cubiculō nostrō.” Iūlius, quī margarītās in herbā quaerit, haec verba nōn audit, sed “Quid est hoc” inquit “quod ante pedēs tuōs iacet?”\n\nAemilia: “Nōn est margarīta.” Iūlius id quod in herbā iacet manū tangit atque “Fui!” inquit horrēns, “Est parva bēstia nūda.”\n\nAemilia: “Quae bēstia? Vīvitne?” “Hāc lūce” inquit Iūlius “nihil vidērī potest”, ac deinde: “Nōn ūna, sed quattuor parvae bēstiae hīc iacent. Nōn vīvunt, nam frīgidae sunt nec sē movent.” Iūlius corpora bēstiārum rūrsus tangit et ālās brevēs sentit.\n\nIūlius: “Pullī avium sunt. Ō, quam foedī sunt pullī mortuī!” ōsculum ferre = ōsculum dare\n\nAemilia: “Hāc lūce vidērī nōn possunt.”\n\nIūlius: “Nōn vidērī, sed tangī possunt. Corpora eōrum nūda sunt atque foeda et sordida, colla longa et nūda . . .”\n\nAemilia: “Mihi quoque nūdum est collum.”\n\nIūlius: “Cūr quattuor pullī mortuī hīc iacent?”\n\nAemilia: “Interrogā Iūliam: ea respondēre potest.”\n\nIūlius: “Eane etiam margarītās tuās reperīre potest?” Aemilia “Surge, Iūlī!” inquit, “Neque enim necesse est margarītās in hortō quaerere: in cubiculō nostrō sunt. Ī in cubiculum atque affer mihi margarītās!” Iūlius autem Aemiliam aspiciēns “Margarītās tibi afferre” inquit “necesse nōn est. Sine ōrnāmentō fōrmōsissimum est collum tuum atque umerī tuī . . .” Hīc Iūlius collō et umerīs Aemiliae ōscula fert atque “Iam venī mēcum” inquit “in cubiculum nostrum!” Iūlius manum Aemiliae capit eamque sēcum dūcit in cubiculum."
 },
 {
  "id": "col15",
  "cap": 15,
  "title": "Colloquium 15",
  "personae": "Mārcus, Iūlia, Aemilia, Iūlius, servī Post merīdiem Mārcus in hortō ambulāns Iūliam inter rosās sedentem videt. Puella quiēta est neque canit.",
  "text": "Frāter apud sorōrem cōnsīdit eamque interrogat: “Cūr tam quiēta es, Iūlia, neque canis?”\n\nIūlia: “Nōn canō, quia trīstis sum.”\n\nMārcus: “Quid trīstis es? Nōnne rosae tē dēlectant?” Mārcus Iūliae rosās pulchrās mōnstrat, neque ea rosās aspicit. In oculīs puellae lacrimae sunt. Mārcus eam lacrimāre videt.\n\nMārcus: “Quid est, Iūlia? Quid plōrās?”\n\nIūlia: “Nōn plōrō. Lacrimō quod pullī sunt mortuī. Ecce pullī.” Iūlia nīdum ē rosīs sūmit et frātrī ostendit. In nīdō sunt quattuor pullī mortuī. Mārcus tacitus pullōs aspicit, tum rīdēre incipit: “Hahaha!”\n\nIūlia: “Quid rīdēs, Mārce?”\n\nMārcus: “Rīdeō, quod pullī foedī sunt!”\n\nIūlia: “Fōrmōsī sunt pullī mortuī. Cūr tū eōs foedōs esse putās?”\n\nMārcus: “Aspice, Iūlia: corpora eōrum sunt nūda et sordida, colla nimis longa, ālae nimis brevēs. Nihil foedius est quam pullus mortuus!” Haec verba audiēns Iūlia plōrāre incipit atque mātrem vocat: “Uhuhū! Mamma!” Mārcus rīdēns ā sorōre plōrante discēdit. Aemilia accurrit et Iūliam oculōs tergēre ac laetam esse iubet: “Tergē oculōs, Iūlia! Es laeta! Quid manū tenēs?” “Nīdum cum pullīs teneō” inquit Iūlia, et mātrī nīdum et pullōs ostendit. Aemilia nīdum aspiciēns “At mortuī sunt pullī!” inquit, “Cūr eōs pullōs foedōs nōn relinquis et mēcum venīs in vīllam?” Haec verba audiēns Iūlia rūrsus plōrāre incipit.\n\nAemilia: “Dēsine plōrāre, Iūlia! Venī in cubiculum! Fessa es.”\n\nIūlia exclāmat: “Nōn sum fessa! Nōn sum fessa!” sed māter manum eius capit et eam sēcum in vīllam dūcit. Nīdus ad terram cadit. Quattuor pullī mortuī in herbā iacent. Iam Iūlia quiēta in lectulō suō dormit. Servī autem quiētī nōn sunt, sed canunt et rīdent, quia dominum nōn vident; servī enim dominum sevērum ā vīllā abesse putant. Sed Iūlius, quī in peristȳlō est, servōs canere et rīdēre audit eōsque quiētōs esse iubet: “Este quiētī, servī! Cūr canitis et rīdētis, dum Iūlia dormit?”\n\nRespondent servī: “Canimus et rīdēmus quia laetī sumus. Nōnne tū canis et rīdēs cum laetus es?”\n\nDominus īrātus magnā vōce clāmat: “Tacēte!!! Ego dominus sum, vōs servī estis! Iūlia dormit.” Puella dormiēns clāmōre patris excitātur. Iūlia ē lectō surgit atque ē cubiculō exit. Iūlius fīliam suam venīre videt eamque interrogat: “Quid nōn dormīs, Iūlia?”\n\nIūlia: “Nōn dormiō, quod tē clāmāre audiō; itaque nōn possum dormīre. Cūr clāmās, pater?”\n\nIūlius: “Ego servōs clāmantēs tacēre iubeō. Nōnne servōs improbōs clāmāre audis?”"

 {
  "id": "col16",
  "cap": 16,
  "title": "Colloquium 16",
  "personae": "Dōrippa, Lepidus, Lȳdia, Mēdus Māne est. Urbs Rōma prīmā lūce sōlis orientis illūstrātur. Ventus frīgidus ā montibus flāre incipit. Dōrippa, amīca Lȳdiae, ē lectō surgit et fenestram aperit. In viā īnfrā fenestram Lepidum advenīre videt. Lepidus, quī multās rosās sēcum fert, ad cubiculum Dōrippae ascendit atque intrāns “Salvē” inquit, “amīca mea!” Dōrippa eum nōn salūtat.",
  "text": "Lepidus: “Ecce rosās quās tibi afferō, Dōrippa, rosa mea! Accipe hās rosās ab amīcō tuō!” Dōrippa tacita Lepidum intuētur neque locō sē movet.\n\nLepidus: “Nōnne rosae tē dēlectant?” Dōrippa rosās manū capit et ad terram iacit!\n\nLepidus: “Quid agis, Dōrippa? Cūr rosās pulchrās ad terram iacis?”\n\nDōrippa: “Eās rosās dā amīcae tuae!”\n\nLepidus: “At rosās amīcae meae dō.”\n\nDōrippa: “Nōn sum ego amīca tua.”\n\nLepidus: “Quid audiō?”\n\nDōrippa: “Id quod vērum est.”\n\nLepidus: “Sed ego tē amō, Dōrippa.”\n\nDōrippa: “Tū nōn mē, sed ancillam amās.”\n\nLepidus: “Quid dīcis?”\n\nDōrippa: “Dīcō ‘nōn mē, sed ancillam ā tē amārī’.”\n\nLepidus: “Quam ancillam dīcis?”\n\nDōrippa: “Eam ancillam fōrmōsam cum quā ambulāre solēs.”\n\nLepidus: “Ego nōn soleō ambulāre cum ancillā.”\n\nDōrippa: “Putāsne mē oculōs nōn habēre? In mediā viā ancillae ōscula dās!” acc mē dat mihi\n\nLepidus: “Dēsine mē accūsāre, Dōrippa! Ea fēmina quam tū tē\t\t tibi ‘ancillam’ dīcis nōn ancilla, sed . . . soror mea est.” sē\t\t sibi\n\nDōrippa: “Vērum nōn dīcis. Tibi soror nūlla est. Sed mihi est D.: “Mihi frāter est” frāter magnus quī tē pulsāre potest!” Dōrippa ‘sibi frātrem D. dīcit ‘sibi frātrem esse’ esse’ dīcit — id quod vērum nōn est!\n\nLepidus: “Ubi est ille frāter tuus?”\n\nDōrippa: “Hīc apud mē habitat.”\n\nLepidus: “Id vērum nōn est. Ego frātrem tuum nōn timeō!”\n\nDōrippa: “Nec frāter meus tē timet. Iam discēde, Lepide, antequam ille revenit!” Dum Dōrippa loquitur, aperītur ōstium, atque Lȳdia cum Mēdō cubiculum intrat. Lȳdia et Mēdus Dōrippam salūtant et ab eā salūtantur, Lepidō spectante. Dōrippa sē ad Lepidum vertit et “Ecce frāter meus” inquit “quī cum amīcā suā venit!”\n\nMēdus: “Quid dīcis?”\n\nDōrippa: “Sūme rosās tuās, Lepide, atque abī, antequam frāter meus tē per fenestram iacit!” Lepidus, quī Mēdum virum magnum et fortem atque fenestram apertam videt, statim per ōstium ēgreditur neque rosās sēcum fert. Dōrippa autem rosās sūmit eāsque per fenestram iacit in viam!\n\nLȳdia: “Quid agis, Dōrippa? Cūr amīcum tuum abīre iubēs ac rosās per fenestram iacis?”\n\nDōrippa: “Is amīcus meus iam nōn est.”\n\nMēdus: “Cūr mē ‘frātrem tuum’ appellās?”\n\nDōrippa: “Quia Lepidus frātrem meum verētur.”\n\nLȳdia: “Sed tibi nūllus est frāter, Dōrippa.”\n\nDōrippa: “Nec Lepidō soror est! Ille dīcit ‘sibi sorōrem esse’, ergō ego ‘mihi frātrem esse’ dīcō!”\n\nLȳdia: “Cūr Lepidus dīcit ‘sorōrem sibi esse’?”\n\nDōrippa: “Quia nōn mē, sed aliam fēminam amat. Eam fēminam ‘sorōrem suam esse’ dīcit — id quod vērum nōn est.” Hoc dīcēns Dōrippa lacrimās tenēre nōn potest. Lȳdia amīcam lacrimantem complectitur atque cōnsōlārī cōnātur.\n\nLȳdia: “Dēsine lacrimāre, Dōrippa mea! Gaudē quod ille vir improbus tē nōn amat!”\n\nDōrippa: “Omnēs virī sunt improbī!”\n\nLȳdia: “Nōn omnēs, Dōrippa. Aspice Mēdum: is est vir probus atque vērus amīcus, quī amīcam suam nōn relinquit.” Dōrippa Mēdum aspicit, tum ad Lȳdiam sē vertēns “Et tū” inquit “es fēmina proba atque vēra amīca, quae nōn relinquis amīcam tuam. — Sed quid hodiē māne ad mē venīs?”\n\nLȳdia: “Veniō quia mihi necesse est Rōmā proficīscī cum amīcō meō. In portū Ōstiēnsī bona nāvis nōs opperītur, atque ventus secundus est.” dolēre ↔ gaudēre et vōs = etiam vōs\n\nDōrippa: “Ergō tū quoque mē relinquis! Iam neque amīcum neque amīcam Rōmae habeō.”\n\nLȳdia: “Multae aliae amīcae sunt tibi, Dōrippa. Ego omnēs amīcas meās Rōmānās relinquō.”\n\nDōrippa: “Sed cūr necesse est tē Rōmā proficīscī atque amīcās tuās relinquere? Id tē interrogō.”\n\nLȳdia: “Quia amīcus meus mē Rōmae relinquere nōn vult. Necesse est enim Mēdum Rōmā fugere, quia dominus eius hīc eum reperīre potest. In Italiā quiētī vīvere nōn possumus, quod Mēdus dominum suum sevērum metuit.”\n\nMēdus: “Ego nūllum dominum metuō nec Rōmā fugiō!”\n\nLȳdia: “Sed necesse est nōs Rōmā profiscīscī.”\n\nMēdus: “Vērum dīcis: necesse est nōs simul in patriam nostrum redīre.”\n\nDōrippa: “Quae est patria vestra?”\n\nLȳdia: “Est Graecia. Mēdus in Graeciam, patriam suam, redīre vult, itaque necesse est mē simul in Graeciam īre, quae mea quoque patria est; neque enim sine amīcō meō vīvere possum.”\n\nMēdus: “Age, venī mēcum, Lȳdia! Tempus est abīre.” Lȳdia amīcae suae ōsculum fert et “Doleō” inquit “quod mihi necesse est tē relinquere, mea Dōrippa. Bene vīve valēque!”\n\nMēdus: “Valē, Dōrippa!”\n\nDōrippa: “Et vōs valēte! Bene nāvigāte!” Exit Mēdus, Lȳdiā sequente."

 {
  "id": "col17",
  "cap": 17,
  "title": "Colloquium 17",
  "personae": "Iūlia, Mārcus Iūlia Mārcum interrogat: “Quid vōs discitis apud magistrum?”",
  "text": "Mārcus sorōrī respondet: “Computāre discimus.”\n\nIūlia: “Tū docē mē computāre, Mārce!”\n\nMārcus: “Ego nōn possum tē docēre, nec enim sum magister. Sed tē interrogāre possum. Ergō respondē mihi: Quot oculī sunt tibi?”\n\nIūlia statim respondet: “Duo.”\n\nMārcus: “Rēctē respondēs, Iūlia. Quot oculī sunt deō Iānō?”\n\nIūlia: “Nōnne eī quoque duo oculī sunt?”\n\nMārcus: “Nōn duo tantum, nam Iānus est deus cui duae faciēs sunt.”\n\nIūlia: “Quōmodo?”\n\nMārcus: “Est ut dīcō. In faciē eius priōre sunt duo oculī, et in faciē posteriōre alterī duo oculī sunt. Iānus simul ante sē et post sē aspicere potest.”\n\nIūlia: “Ergō Iānus quattuor oculōs habet, nam duo et duo sunt quattuor.”\n\nMārcus sorōrem laudat: “Rēctē respondēs, Iūlia. Bene computās.” Iūliā tacente, Mārcus “Nōnne tū gaudēs” inquit “quod ā mē laudaris?” tot . . . quot = tam multī . . . quam\n\nIūlia: “Gaudeō quod ā tē laudor, sed id quod interrogor nimis facile est. Ego nōn parvōs tantum numerōs sciō.”\n\nMārcus: “Ā parvīs numerīs incipere oportet. Nunc autem ad hoc respondē: Quot digitī sunt tibi?”\n\nIūlia digitōs manūs sinistrae numerat: “Ūnus, duo, trēs, quattuor, quīnque. In hāc manū sunt quīnque digitī.”\n\nMārcus: “Et in manū dextrā item quīnque digitī sunt. Quot digitī sunt in duābus manibus tuīs?”\n\nIūlia: “Id nesciō.”\n\nMārcus: “Quot sunt quīnque et quīnque? Sī nescīs ad hoc respondēre, puella stulta es. Digitīs computā!” Iūlia quemque digitum manūs dextrae tangit, dum numerōs dīcit ā sex ūsque ad decem: “Sex, septem, octō, novem, decem. Quīnque et quīnque sunt decem. Mihi sunt decem digitī.”\n\nMārcus: “Alterum respōnsum est rēctum — alterum nōn rēctum! Nec enim in manibus tantum, sed etiam in pedibus sunt digitī. In duōbus pedibus tuīs tot digitī sunt quot in manibus: quot igitur digitī sunt tibi?”\n\nIūlia: “Tot digitōs numerāre nōn possum.”\n\nMārcus: “Quot sunt decem et decem?”\n\nIūlia: “Duodecim, putō; nec vērō certa sum.” Iūlia Mārcō respōnsum incertum atque prāvum dat.\n\nMārcus: “Duodecim? Id respōnsum prāvum ac stultum est! Nōn cōgitās antequam mihi respondēs, Iūlia; itaque prāvē ac stultē respondēs!” Iūlia, quae lacrimās tenēre vix potest, “Sed nimis difficile est” inquit “id quod interrogor ā tē, Mārce; quamquam multum cōgitō, nōn possum rēctē respondēre.”\n\nMārcus: “Id quod tū ā mē interrogāris multō facilius est quam id quod nōs interrogāmur ā magistrō. Difficile nōn est numerāre omnēs digitōs suōs, et manuum et pedum. Incipe ab ūndecim!” Iūlia lacrimam dētergēns ab ūndecim numerāre incipit: “Ūndecim, duodecim, trēdecim, quattuordecim . . .” Hīc puella numerāre dēsinit atque “Cēterōs” inquit “numerōs nesciō.”\n\nMārcus: “. . . quīndecim, sēdecim, septendecim, duodēvīgintī, ūndēvīgintī, vīgintī. Decem et decem sunt vīgintī. Tibi sunt vīgintī digitī.”\n\nIūlia frātrem laudat: “Tū bene computās, Mārce.” Mārcus rīdēns “Laetor” inquit “quod ā sorōre meā laudor. Ā magistrō meō semper reprehendor, numquam laudor.”\n\nIūlia: “Vērum nōn dīcis; nam sī bene computās, ā magistrō laudāris, nōn reprehenderis.”\n\nMārcus: “At ab illō magistrō ego numquam laudor. Diodōrus mē laudāre nōn vult, quamquam saepe rēctē respondeō.”\n\nIūlia: “Cūr tē laudāre nōn vult magister?”\n\nMārcus: “Quia mē malum discipulum esse putat. Ego vērō putō Diodōrum malum esse magistrum!”\n\nIūlia: “Quid? Nōnne doctus est magister tuus?”\n\nMārcus: “Nōn dīcō ‘eum indoctum esse’, nam is multās rēs scit quās nōs discipulī nescīmus; sed malus est magister, quia nihil nōs docēre potest. Cum ille tergum vertit, nōs eum rīdēmus atque aliās rēs agimus — nec enim magister post sē aspicere potest ut Iānus! Et cum ille ē librō suō recitat, nōs simper dormīmus!”\n\nIūlia: “Vōsne dormītis magistrō recitante?”\n\nMārcus: “Nōn possumus nōn dormīre, cum magister doctus ē magnō librō recitāre incipit.”\n\nIūlia: “Nōnne ā magistrō excitāminī?”\n\nMārcus: “Magister recitāns oculōs ā librō suō nōn tollit. Nihil igitur videt praeter librum, nihil audit praeter vōcem suam! Ergō nōs bene dormīmus, nec rūrsus excitāmur antequam is recitāre dēsinit; tum clāmōre magistrī īrātī excitāmur, nec modo verbīs reprehendimur, sed etiam virgā verberāmur!”\n\nIūlia: “Sī magistrum rīdētis atque in lūdō dormītis, rēctē reprehendiminī et verberāminī, neque enim in lūdō dormīre licet. Ego tē discipulum improbum nōn cōnsōlor, quod tergum tibi dolet, at dēlector lacrimīs tuīs!”\n\nMārcus: “Putāsne mē lacrimāre? Immō magister mē lacrimantem facere nōn potest, etiam sī mē iterum atque iterum verberat. Ego putō bracchium eius dextrum tam dolēre quam tergum meum!”"
