 {
  "id": "col18",
  "cap": 18,
  "title": "Colloquium 18",
  "personae": "Sextus, Mārcus, Titus Merīdiē discipulī “Valē” inquiunt, “magister!” atque ē lūdō exeunt. In viā ante lūdum Sextus Mārcum interrogat: “Ubi est is servus quī solet tē hīc exspectāre?”",
  "text": "Mārcus breviter respondet: “Hodiē abest.”\n\nTitus: “Ergō necesse est tē ipsum rēs tuās portāre, ut ego et Sextus rēs nostrās ipsī portāmus.”\n\nMārcus: “Cūr vōs semper sōlī in lūdum ītis?”\n\nTitus: “Quia nōs in ipsō oppidō Tūsculō habitāmus, nōn procul ab oppidō, ut tū. Ego gaudeō quod mihi necesse nōn est servum mēcum habēre.”\n\nMārcus: “At ego gaudeō quod mihi necesse nōn est tabulam et librōs portāre.”\n\nSextus: “Id necesse est hodiē.” Mārcus rīdēns “Necesse nōn est” inquit, “sī vōs mēcum venītis ac rēs meās portātis!”\n\nTitus: “Quid? putāsne nōs servōs esse tuōs?”\n\nSextus: “Mihi nōn licet tēcum venīre, nam domī māter mē exspectat.”\n\nMārcus: “Itane mātrem tuam verēris, Sexte?” Sextus, quī mātrem suam amat atque verētur ut fīlius probus, nihil ad hoc respondet. inter sē ­aspiciunt: Titus Sextum aspicit et Sextus Titum\n\nMārcus: “Certē vōs fīliī probī estis, sī semper rēctā viā ad mammās vestrās redītis!” Titus et Sextus inter sē aspiciunt. Paulō post trēs puerī simul per portam ex oppidō ēgrediuntur, Mārcus autem ipse librum et tabulam suam portat. Dum puerī in viā ambulant, Sextus Mārcō “Ubi est” inquit “is servus quem dīcis hodiē abesse?”\n\nMārcus: “Putō Mēdum esse Rōmae, nam sciō puellam Rōmānam ab eō amārī. Mēdus dīcit ‘amīcam suam esse fēminam pulcherrimam’.”\n\nTitus: “Omnēs virī id dīcere solent. Nōnne pater tuus dīcit ‘fēminam pulcherrimam esse mātrem tuam’?”\n\nMārcus: “Saepe ita dīcit pater — et vērē dīcit. Itaque mātrī ōrnāmenta et vestīmenta pulchra largītur. Māter mea gemmīs et margarītīs clārissimīs ōrnātur.”\n\nSextus: “Pater meus dīcit ‘mātrem meam etiam sine ōrnāmentīs fēminam esse pulcherrimam’.”\n\nMārcus: “Quārē id dīcit pater tuus? Ita mātrem tuam cōnsōlātur, quod nūlla eī dat ōrnāmenta.”\n\nSextus: “Necesse nōn est fēminam fōrmōsam gemmīs et margarītīs ōrnārī.” Mārcus rīdēns “Ergō” inquit “necesse est mātrem tuam ita ōrnārī!” Ad haec verba Sextus īrātus exclāmat: “Quid? Tūne dīcis ‘mātrem meam fēminam turpem esse’?” simulque ōs Mārcī pugnō pulsat! Mārcus perterritus sē dēfendere cōnātur, sed Sextus corpus eius complectitur eumque ad terram iacit. Antequam Mārcus rūrsus surgere potest, Sextus, quī puer gravior est, super pectus eius cōnsīdit. Sextus pugnum ante oculōs Mārcī tenēns “Dīc” inquit “‘fēminam pulchriōrem esse mātrem meam quam tuam’!”\n\nMārcus: “Fēmina pulchrior est māter mea quam tua!” Sextus īrātus “Prāvē dīcis” inquit, ac puerum iacentem pulsat.\n\nMārcus: “Quid mē pulsās? Dīcō id quod mē iubēs.”\n\nSextus: “Iubeō tē ‘mātrem meam pulchriōrem esse’ dīcere.”\n\nMārcus: “Atque ego id ipsum ‘mātrem meam pulchriōrem esse’ dīcō.”\n\nSextus: “Nōn ‘meam’, sed ‘tuam’ dīcere oportet.”\n\nMārcus: “Tuam.”\n\nSextus: “Dīc tōtam sententiam: ‘Māter tua pulchrior est quam mea’.”\n\nMārcus: “Iam ipse dīcis ‘mātrem meam pulchriōrem esse’!”\n\nSextus: “Id nōn dīcō, sed tē ita dīcere iubeō.”\n\nMārcus: “Cūr igitur mē pulsās, cum id dīcō?”\n\nSextus: “Quia prāvē dīcis. Iam dīc rēctē!”\n\nMārcus: “Rēctē!”\n\nSextus: “Etiamne mē rīdēre audēs? Iam satis est. Hoc accipe!” Ita dīcēns Sextus nāsum Mārcī pugnō pulsat. Mārcus perterritus Titum vocat: “Tite! Tite! Dēfende mē ab hōc puerō barbarō!” Statim Titus, quī sanguinem dē nāsō Mārcī fluere videt, Sextum ā tergō oppugnat. Sextus, quamquam puer fortis est, simul contrā duōs puerōs pugnāre nōn potest: iam is in viā dūrā iacet sub Titō et Mārcō, quī eum semel atque iterum pugnīs pulsant. Sextus sē locō movēre nōn potest, quod duo puerī super corpus eius sedent alter bracchia, alter crūra tenēns. Tum Sextus “Aspicite caelum!” inquit, “Ecce nūbēs ātrae. Nōnne tempestātem ac fulgura verēminī?” Eōdem tempore caelum magnō fulgure illūstrātor atque imber cadere incipit. Titus et Mārcus, quī fulgura ac tonitrum verentur, statim surgunt et Sextum in viā iacentem relinquunt. Titus librum tabulamque suam tollit et rēctā viā ad oppidum currit. Item Mārcus rēs suās tollit atque abīre vult, cum tabulam Sextī in mollī herbā apud viam iacēre videt. Quid tum facit Mārcus? Tabulam Sextī capit tabulamque suam in locō eius pōnit. Deinde sōlus per imbrem ambulat ad vīllam. Postrēmō surgit Sextus. Vestīmenta eius sordida sunt, sanguis dē nāsō fluit, deest ūnus ē dentibus priōribus. Antequam ad oppidum īre incipit, tabulam in herbā iacentem tollit. Sextus, quī eam putat tabulam suam esse, Tūsculum ad mātrem redit."
 },
 {

  "title": "Colloquium 19",
  "personae": "Fabia, Cornēlius Cornēlius iam domī est apud Fabiam uxōrem, quae marītum adesse gaudet. Post merīdiem marītus et uxor in ātriō Sextum, fīlium suum, exspectant.",
  "text": "Fabia: “Ō, quam sōla hīc eram sine tē, mī Cornēlī! Sed iam gaudeō tē mēcum esse.”\n\nCornēlius: “Ego nōn minus gaudeō mē esse domī apud tē, uxōrem meam amantissimam. In urbe Rōmā male mē habeō, sed Tūsculī semper dēlector domō meā pulcherrimā. . . .”\n\nFabia: “Num domō tuā plūs dēlectāris quam uxōre tuā?”\n\nCornēlius: “Scīs nihil ā mē plūs amārī quam tē, mea Fabia. Hāc domō dēlector et quia ipsa per sē pulchra est et quia hīc uxōrem meam pulcherrimam aspiciō.”\n\nFabia: “Mē quoque dēlectat domus nostra, quamquam minor est quam aliae domūs nec signīs deōrum ōrnātur.”\n\nCornēlius: “Sciō multās domōs Tūsculānās et māiōrēs et meliō­ rēs esse quam nostram atque columnīs et signīs pulchriōribus ōrnārī, nec tamen haec domus mihi vidētur minus pulchra esse. Domūs hominum dīvitum signīs deārum magnificīs ōrnantur — domus mea fēminā ōrnātur optimā et ­pulcherrimā!”\n\nFabia: “Verbīs magnificīs scīs tū laudāre et uxōrem et domum tuam, Cornēlī. Mihi quoque haec domus pulchra vidētur, nec rēs pulchra (esse) mihi vidētur = rem pulchram esse putō domum = ad ­domum ūllum peristȳlum flōribus pulchriōribus ōrnātur quam nostrum; sed hoc ātrium nimis obscūrum est.”\n\nCornēlius: “Cum sōl lūcet, ātrium nostrum satis clārum est. Iam vērō caelum nūbibus ātrīs operītur, itaque obscūrum est ātrium.” Fabia caelum obscūrum aspicit et “Rēctē dīcis” inquit, “Sed, nesciō quōmodo, merīdiē prope tam obscūrum est quam vesperī.”\n\nCornēlius: “Nōn merīdiēs, sed hōra septima est.”\n\nFabia: “Iamne hōra septima est? Ubi igitur est Sextus? Nōn multō post merīdiem ē lūdō redīre solet. Quid eum in viā agere putās?”\n\nCornēlius: “Nesciō. Sunt puerī puerī. . . .”\n\nFabia: “At Sextus semper rēctā viā domum redit.”\n\nCornēlius: “Sī improbī sunt discipulī, ūsque ad hōram septimam in lūdō tenentur ā magistrō.”\n\nFabia: “Sextus nōn est discipulus improbus. Praetereā ille lūdī magister pigerrimus numquam discipulōs suōs post merīdiem tenet: hōrā sextā omnēs domum remittit, neque eōs post merīdiem revenīre iubet — ut aliī magistrī.”\n\nCornēlius: “Ego nōn putō pigrum esse magistrum Sextī. Certē nōn optimus est magister, sed tamen melior est quam tū putās. Nōnne fīlium nostrum bene legere, scrībere, computāre docet?”\n\nFabia: “Sextus discipulus industrius ac prūdēns est, ut scīs; ergō bene discit, quamquam male docētur ā magistrō pigrō atque stultō!”\n\nCornēlius: “Ita sunt mātrēs discipulōrum: sī fīliī eārum male discunt, magistrum accūsant ‘eum’que ‘male docēre’ dīcunt; sī autem bene discunt fīliī, nōn magistrum, sed discipulōs laudant.”\n\nFabia: “Nōnne licet mihi laudāre Sextum? An putās tuum Sextum malum esse discipulum?”\n\nCornēlius: “Id nōn dīcō. Sciō Sextum bonum discipulum esse, nec vērō Diodōrum malum esse magistrum putō.”\n\nFabia: “Cūr igitur aliī parentēs fīliōs suōs ad aliōs magistrōs mittunt?”\n\nCornēlius: “Nōn omnēs id faciunt. Fīliī Iūliī ab eōdem magistrō docentur ac fīlius noster.”\n\nFabia: “Sciō Diodōrum adhūc quattuor discipulōs habēre, quōrum duo sunt fīliī Iūliī; sed ante paucōs mēnsēs octō discipulōs habēbat. Iamne intellegis malum esse magistrum, quī ā discipulīs suīs relinquitur?”\n\nCornēlius: “Certē nōn pēior lūdī magister est Diodōrus quam ille quī mē Rōmae docēbat.”\n\nFabia: “Neque Sextus, ut ego putō, pēior discipulus est quam tū apud magistrum tuum erās.”\n\nCornēlius: “Ergō optimus discipulus est Sextus!”\n\nFabia: “Hīs verbīs nōn modo Sextum, sed etiam tē ipsum laudās, Cornēlī.”\n\nCornēlius: “Ego ipse nōn plūs mē laudō quam magister meus mē laudābat: semper enim dīcēbat ‘optimum mē esse discipulum’.”\n\nFabia: “Itane dīcēbat magister tuus?”\n\nCornēlius: “Ita, atque vērē dīcēbat; nam cēterī discipulī omnēs pēiōrēs erant: male computābant, male scrībēbant, male recitābant, quia cotīdiē in lūdō dormiēbant nec magistrō pārēbant — ego sōlus bene computābam, bene scrībēbam, bene recitābam, quia numquam in lūdō dormiēbam, sed omnia verba magistrī audiēbam et semper eī pārēbam!”\n\nFabia: “Sī hoc vērum est, tū certē optimus erās omnium discipulōrum!”\n\nCornēlius: “Rēctē dīcis, Fabia: ego optimus discipulus eram!”\n\nFabia: “Tacē, Cornēlī! Nōn oportet sē ipsum ita laudāre. Num vērē eōdem modō ā magistrō tuō laudābāris?”\n\nCornēlius: “Iīs ipsīs verbīs laudābar ā magistrō meō. Sed iam taceō. Hoc tantum addō: Cum ita mē laudō, simul laudō magistrum meum; ego enim bonus discipulus eram et bene discēbam, quod ab optimō magistrō docēbar.”\n\nFabia: “Cūr cēterī discipulī tam male docēbantur ab illō magistrō optimō?”\n\nCornēlius: “Nōn male docēbantur, sed tamen male discēbant, quia ipsī tam pigrī erant quam fīlius Iūliī.”\n\nFabia: “Utrum fīlium dīcis, māiōremne an minōrem?”\n\nCornēlius: “Fīlium eius māiōrem dīcō, eum cui praenōmen est Mārcus.”\n\nFabia: “Rēctē dīcis, Cornēlī. Is enim discipulus omnium pigerrimus est atque tam stultus quam puer barbarus!”\n\nCornēlius: “Nimis sevēra es, Fabia. Discipulum pigrum esse Mārcum sciō — Iūlius ipse id dīcit —, nec tamen putō eum stultiōrem esse quam cēterōs discipulōs.”\n\nFabia: “Ergō Mārcus, putō, tam prūdēns est discipulus quam Sextus noster! Nōnne tibi satis est laudāre malum magistrum — etiamne discipulum eius pessimum laudāre audēs? Verbis tuīs laudantibus omnēs rēs in contrāriam partem vertis!” Tum Cornēlius rīdēns “Id nōn dīcis” inquit “cum pulchritūdinem tuam laudō!” — sed eō ipsō tempore ātrium illūstrātur clārissimō fulgure atque māximus tonitrus audītur. Verba Cornēliī propter tonitrum ā Fabiā nōn audiuntur."

  "personae": "Diodōrus, Tlēpolemus, Symmachus Diodōrus, lūdī magister, quī laetātur discipulōs improbōs iam abesse, suum Tlēpolemum servum vocat. Tlēpolemus intrāns silentium dominī animadvertit eumque interrogat: “Valēsne, domine?”",
  "text": "Diodōrus: “Nōn rēctē valeō, Tlēpoleme. Fessus sum. Caput dolet — et bracchium dextrum.”\n\nTlēpolemus: “Cūr medicum nōn adīs?”\n\nDiodōrus: “Medicus stultus est. Ipse melius mē sānāre possum. Prīmum ēsse et bibere volō, tum dormīre. Affer mihi cibum!” Exit Tlēpolemus. Paulō post pānem et duōs piscēs et pōculum aquae plēnum dominō affert. Diodōrus aquam vidēns “Quid?” inquit, “Aquamne mihi affers?”\n\nTlēpolemus: “Merīdiē aquam bibere oportet.”\n\nDiodōrus: “Servōs oportet aquam bibere. Ego nōn aquam, sed vīnum bibere volō.”\n\nTlēpolemus: “Sine pecūniā vīnum tibi emere nōn possum, nec tū mihi ūllam pecūniam dās.” Diodōrus sacculum nummōrum plēnum servō ostendit atque “Hodiē” inquit “nummōs habeō. Nescīsne kalendās Iūniās esse hodiē? Kalendīs mercēdem accipiō ā discipulīs. Iam bonum vīnum emere possum.” vīnum -ī n vīs-ne mē tē-cum venīre? (: iubēsne mē . . . v.?) volō tē . . . manēre (: iubeō tē . . . m.) angustus -a -um ↔ lātus facere imp fac! facite!\n\nTlēpolemus: “Ego ad tabernam ībō vīnumque tibi emam.”\n\nDiodōrus: “Bene faciēs. Ecce pecūnia.” Magister servō suō dēnārium dat. Servus ad ōstium versus gradum facit, cum Diodōrus “Manē!” inquit, “Nōlī abīre! Ipse ad tabernam ībō.”\n\nTlēpolemus: “Vīsne mē tēcum venīre? Ego vīnum feram.”\n\nDiodōrus: “Volō tē hīc manēre. Vīnum ē tabernā nōn feram, sed illīc bibam. Redde mihi nummum!” Servus dominō dēnārium reddēns “Paulum bibe!” inquit, “Cūrā corpus tuum!” “Tū officium tuum cūrā!” inquit Diodōrus, “Nōn medicus, sed servus meus es.”\n\nTlēpolemus: “Quid vīs mē facere?” Magister epistulam prōmit atque “Hanc epistulam” inquit “volō tē ad Lūcium Iūlium Balbum ferre.”\n\nTlēpolemus: “Ubi habitat ille?” “Aspice per hanc fenestram!” inquit Diodōrus, “Vidēsne illum montem?” Tlēpolemus per fenestram apertam montem Albānum aspicit. Inter Tūsculum et montem Albānum parva vallis interest. “Videō” inquit Tlēpolemus, “Est mōns Albānus.”\n\nDiodōrus: “Vīlla Iūliī sub illō monte sita est, nec vērō ab hōc locō cernī potest; sed ecce via angusta quae ad vīllam fert. Age, discēde!”\n\nTlēpolemus: “Quid est in epistulā?”\n\nDiodōrus: “Nihil ad tē, serve! Modo fac officium tuum! Valē!” Tlēpolemus discēdit epistulam magistrī ferēns. Sōlus Diodōrus pānem et piscēs ēst atque paulum aquae bibit. Hodiē autem, quamquam fessus est, post cibum nōn dormit, sed statim domō exit. Magister viam angustam intrat, ubi tabernam obscūram adit. Ea taberna plena est hominum bibentium quī inter sē colloquuntur, aliī clāmant rīdentque, aliī canunt. Iam Diodōrus quoque ē magnō pōculō vīnum bibit, dum colloquitur cum amīcīs. “Salvē, lūdī magister!” inquit ūnus ē bibentibus. Diodōrus pōculum tollēns “Et tū salvē, Symmache!” inquit.\n\nSymmachus: “Quid agis? puerōs nōn docēs?”\n\nDiodōrus: “Quid tū, medice? aegrōs nōn cūrās?”\n\nSymmachus: “Hōc annī tempore paucī sunt aegrī.”\n\nDiodōrus: “Mihi sunt paucī discipulī — quōs merīdiē domum remittō, neque eōs post merīdiem revenīre iubeō. Sex hōrās puerōs docēre satis est mihi! Nunc vērō vīnum bibere volō.”\n\nSymmachus: “Merīdiē nōn vīnum, sed aquam bibere oportet.”\n\nDiodōrus: “Cūr nōn lac bibere mē iubēs, medice, ut parvulum īnfantem?”\n\nSymmachus: “Sī vīs sānus vīvere, paulum vīnī bibe! Cūrā corpus tuum!”\n\nDiodōrus: “Semper mē paulum bibere iubēs, sed ipse plūra pōcula bibis quam ego.”\n\nSymmachus: “Ego rēctē valeō, nec plūs bibō quam opus est. Tē autem male valēre videō, Diodōre, ac medicus tuus sum.”\n\nDiodōrus: “Ego satis bene valeō, quamquam fessus sum atque caput mihi dolet.” sanguinem mittere = vēnam aperīre\n\nSymmachus: “Ergō sanguis tibi superest. Vīsne me sanguinem mittere tibi?”\n\nDiodōrus: “Nōlō profectō! Iam satis dolet bracchium. Eō modō mē sānāre nōn potes.”\n\nSymmachus: “Mēne malum esse medicum putās?”\n\nDiodōrus: “Immō optimum tē esse medicum putō. Sed hoc quod mē fessum ac dolentem facit nūllus medicus potest sānāre.”\n\nSymmachus: “Quid est hoc quod ā nūllō medicō sānārī potest?”\n\nDiodōrus: “Quod ego malus sum magister! Discipulī meī male discunt nec mihi pārent . . .”\n\nSymmachus: “Atque ego optimum tē esse magistrum putābam.”\n\nDiodōrus: “Parentēs id nōn putant, neque igitur līberōs suōs ad mē mittere volunt.”\n\nSymmachus: “Quot discipulī sunt tibi?”\n\nDiodōrus: “Adhūc quattuor; sed mox iī quoque mē relinquent.”\n\nSymmachus: “Cūr hoc metuis?”\n\nDiodōrus: “Quia Iūlius, pater duōrum discipulōrum, mox epistulam leget in quā scrībō ‘discipulum improbum ac pigrum esse eius fīlium māiōrem’ — id quod vērum est!”\n\nSymmachus: “Etiam sī vērum est, necesse nōn erat tē id scrībere. Certē Iūlius nōn minus īrātus erit tibi, quod tū fīlium eius māiōrem nihil docēre potes, quam mihi iam est, quia ego nōn possum sānāre fīlium eius minōrem.”\n\nDiodōrus: “Nesciēbam tē eius familiae medicum esse. Sed cūr fīlium Iūliī sānāre nōn potes?”\n\nSymmachus: “Profectō possum. Puer pede tantum aeger est, atque etiam sine medicō mox sānus erit. Neque igitur, ut nunc putō, necesse erat sanguinem eī mittere. Iūlius dīcit ‘fīlium suum propter medicum iam nōn sōlum pede, sed etiam bracchiō aegrum esse, atque mē esse malum medicum!’”\n\nDiodōrus: “Nōlī id cūrāre, Symmache!”\n\nSymmachus: “Facile est hoc dīcere, sed Iūlius mē rūrsus arcessere nōn vult nec mihi mercēdem meam dare.”\n\nDiodōrus: “Īdem Iūlius iam dīcet ‘mē esse lūdī magistrum pessimum’, neque mihi ex hōc diē mercēdem dabit. Sed ego id nōn cūrō. Iam nōlō puerōs docēre. Lūdum meum claudam. Dum discipulōs pigrōs litterās et numerōs docēre cōnor, nūllum mihi tempus vacuum est ad librōs meōs.”\n\nSymmachus: “At quōmodo tū vīvēs sine mercēde?”\n\nDiodōrus: “Ego neque uxōrem neque līberōs habeō. Paulum mihi satis est. Omnēs rēs meās vēndam praeter librōs: etiam sī nihil aliud possidēbō, parvō bene vīvere poterō.”\n\nSymmachus: “Etiamne vīnō carēbis?”\n\nDiodōrus: “Sī necesse erit, aquam bibam — dum bonōs librōs legam.”\n\nSymmachus: “Quōs tū ‘bonōs librōs’ dīcis?”\n\nDiodōrus: “Multōs ‘bonōs librōs’ dīcere possum, sed in prīmīs librōs Platōnis, in quibus Sōcratem cum amīcīs colloquentem facit. Semper dēlector cum legō sermōnēs illōs clārissimōs, quamquam multa sunt in iīs quae ego nōn bene intellegō; neque Aristotelēs, discipulus Platōnis doctissimus, facilior esse mihi vidētur. Iam vērō Epicūrī librōs legere incipiam.”\n\nSymmachus: “Quis est Epicūrus?”\n\nDiodōrus: “Epicūrus est philosophus Graecus, ut Sōcratēs et Platō et Aristotelēs.”\n\nSymmachus: “Ego numquam philosophum audiō aut legō. Cūr tū philosophōs Graecōs ita dīligis?”\n\nDiodōrus: “Quia philosophī nōs rēctē beātēque vīvere docent. Nōlī putāre, Symmache, hominī satis esse corpus cūrāre: etiam mentem cūrāre opus est, neque id fierī potest sine librīs philosophōrum. Is sōlus beātus esse mihi vidētur cui nōn modo corpus sānum est, sed etiam mēns sāna in corpore sānō.” parvum -ī n = paulum in prīmīs = ante aliōs omnēs Platō -ōnis m Sōcratēs -is m Aristotelēs -is m Epicūrus -ī m philosophus -ī m mēns mentis f ↔ corpus particula = parva pars atomus -ī f cōnstāre ex = ­efficī ex nātūra -ae f Lucrētius -ī m ex-haurīre ↔ implēre\n\nSymmachus: “Ego beātē vīvō ac mentem sānam habeō, quamquam philosophōs nōn legō neque deōs vereor.”\n\nDiodōrus: “Epicūrus docet deōs rēs hūmānās nōn cūrāre.”\n\nSymmachus: “Ego putō nūllōs esse deōs. Tūne Iovem cēterōsque deōs verēris?” Diodōrus. “Nōn vereor eōs, ut mē docet Epicūrus. Sed, nesciō quōmodo, multās rēs videō quae incertum mē faciunt. Sī nūllus est deus, quōmodo sōl et stēllae movērī possunt? unde oriuntur ventī et imbrēs? quis fulgura tonitrūsque efficit?”\n\nSymmachus: “Interrogā Epicūrum, magistrum tuum!”\n\nDiodōrus: “Sī Epicūrum rēctē intellegō, ‘haec omnia per sē fierī’ dīcit. Praetereā dīcit, ut ante eum Dēmocritus, ‘omnem rem, omnem māteriam efficī ex partibus minimīs, quae semper moventur.’ Eae particulae minimae, quae dīvidī nōn possunt, Graecē appellantur ‘atomī’.” Symmachus pōculum tollēns “Quid?” inquit, “Etiamne hoc pōculum ex minimīs particulīs cōnstāre putās? Cum tam stultē loqueris, nōn putō mentem tibi sānam esse!”\n\nDiodōrus: “Adhūc incertus sum, sed iam plūra dē nātūrā rērum legam apud Epicūrum et apud Lucrētium.”\n\nSymmachus: “Quis est Lucrētius?”\n\nDiodōrus: “Est discipulus Epicūrī Rōmānus. Sex librōs eius possideō quibus titulus est Dē rērum nātūrā.” Hīc Symmachus pōculum exhauriēns “Bene valē” inquit, “discipule Epicūrī!” Sed eō ipsō tempore fulgur clārissimum tabernam obscūram illūstrat, sequente tonitrū māximō. “Iuppiter Optime Māxime!” exclāmat medicus perterritus, dum pōculum eī ē manū lābitur. Diodōrus rīdēns “Vidēsne” inquit “pōculum tuum cōnstāre ex particulīs minimīs?”"

  "personae": "Diodōrus, Symmachus, Sextus Viae oppidī, quae paulō ante plēnae erant hominum, iam propter tonitrum atque imbrem vacuae sunt. Hominēs enim fulgura tonitrumque metuunt neque per imbrem ambulāre volunt. Diodōrus quoque cum amīcō suō Symmachō sub tēctō manet. Iterum atque iterum taberna obscūra fulgure clārissimō illūstrātur. Inter tonitrūs amīcī colloquī ac vīnum bibere pergunt. Medicus iam novum pōculum vīnī plēnum tenet. Diodōrus autem pōculum vacuum in mēnsā pōnit et “Tempus iam est” inquit “domum mē redīre. Post merīdiem hōram dormīre soleō.”",
  "text": "Symmachus: “Per hunc tonitrum dormīre nōn potes. Manē sub tēctō atque alterum pōculum bibe mēcum!”\n\nDiodōrus: “Num melius est bibere quam dormīre?”\n\nSymmachus: “Certē vīnum bibere melius est quam per imbrem frīgidum ambulāre. Ecce vacuae sunt viae. Nēmō per hunc imbrem inter tot fulgura ambulāre audet.” Diodōrus alterum pōculum vīnī poscit. Tum viam aspiciēns puerum sōlum ambulantem videt atque “Vidēsne” inquit “parvum puerum quī nec fulgura nec imbrem metuit?”\n\nSymmachus puerum vocat: “Heus, puer! Venī sub tēctum! Nōlī per imbrem frīgidum ambulāre!” heus! : audi! sub + abl/acc: manē sub tēctō venī sub tēctum Ad vōcem Symmachī puer sē vertit et tabernam adit. Nōn sōlum ūmida, sed etiam sordida sunt vestīmenta eius, atque faciēs cruōre et sordibus operītur. Itaque Diodōrus nōn cognōscit discipulum suum Sextum, neque Sextus in tabernā obscūrā magistrum suum cognōscit.\n\nSymmachus puerum sordidum spectāns exclāmat: “Ō, quam sordidus es, puer! Unde venīs et quō īs?”\n\nSextus respondet: “Ē lūdō veniō et domum eō.” At Symmachus “Nōn rēctā viā” inquit “ē lūdō venīs.” Hīc taberna novō fulgure illūstrātur. Symmachus cruōrem in faciē puerī cōnspiciēns “Quid?” inquit, “unde est cruor ille? Num magister lūdī ōs tuum ita pulsāvit?” Simul Sextus magistrum suum inter hominēs bibentēs cognōscit et “Salvē” inquit, “magister!” Symmachus Diodōrō “Tūne” inquit “eius puerī es magister?” “Ita sum” inquit Diodōrus, “Iam discipulum meum cognōscō. Sextus est discipulus meus optimus.” Ad hoc Symmachus “At tū” inquit “magister es sevērissimus, sī discipulum tuum optimum pugnō pulsāvistī!”\n\nDiodōrus: “Ego nōn pulsāvī eum.”\n\nSymmachus: “Sed ecce cruor in faciē puerī. Aliquis ōs et nāsum eius pulsāvit. Quis tē pulsāvit, puer?” Tacente Sextō, Diodōrus “Certē” inquit “is cum aliīs puerīs pugnāvit et ab iīs pulsātus est.”\n\nSymmachus: “Nōn magistrum, sed discipulum interrogāvī. Tū respondē, Sexte: ā quō pulsātus es?”\n\nSextus: “Ā Mārcō pulsātus sum. Sed ego ipse Mārcum pulsāvī.”\n\nDiodōrus: “Cūr tū Mārcum pulsāvistī?”\n\nSextus: “Quia puer improbus est. Prīmum dīxit ‘mātrem meam turpem esse’, deinde mē ‘puerum barbarum’ appellāvit! Itaque eum pulsāvī!”\n\nDiodōrus: “Profectō nōn sine causā Mārcum pulsāvistī. Ego tē nōn reprehendō. Sed quid tū ipse ab eō pulsātus es? Nōn putō Mārcum tam validum esse quam tē.”\n\nSextus: “Nōn ā Mārcō sōlō, sed ā Mārcō et Titō pulsātus sum. Duo puerī mē ūnum pulsāvērunt!”\n\nDiodōrus: “Ubi pugnāvistis?”\n\nSextus: “Pugnāvimus in viā nōn procul ā portā.”\n\nSymmachus: “Cūr tam sordida est vestis tua?”\n\nSextus: “Quia humī iacuī. Sed vestis Mārcī tam sordida est quam mea: is quoque humī iacuit . . .” Sīc Sextus dē pugnā puerōrum nārrāre pergit. Symmachus, postquam omnia audīvit, “Iam satis nōbīs nārrāvistī” inquit “dē pugnā vestrā. Ostende mihi tabulam tuam! Magister iam dīxit ‘tē esse discipulum optimum’.” Sextus medicō tabulam ostendit, in quā litterae scrīptae sunt. Symmachus litterās legere cōnātur et “Hās litterās foedās” inquit “vix legere possum.”\n\nDiodōrus: “Quid ais? Nōnne pulchrae tibi videntur litterae Sextī? Ego illās litterās laudāvī: dīxī ‘Sextum et pulchrē et rēctē scrīpsisse’.”\n\nSymmachus: “Tūne hās litterās foedās laudāvistī? Neque sōlum foedē, sed etiam prāvē scrīpsit discipulus tuus optimus! Itane tū eum scrībere docuistī?” “Ego Sextum pulchrē et rēctē scrībere docuī” inquit Diodōrus, “Dā mihi tabulam!” Et, postquam tabulam in manūs sūmpsit: “Quid hoc est? Tūne hās litterās scrīpsistī?”\n\nSextus: “Quārē id mē interrogās, magister? Certē ego litterās scrīpsī, atque tū eās laudāvistī: dīxistī ‘mē pulcherrimē et rēctissimē scrīpsisse’.”\n\nDiodōrus: “Hae litterae foedissimae ā tē scrīptae nōn sunt. ferre: ferō ferimus fers fertis fert ferunt dūcere dūxisse dūx- < ducsNōn tua, sed Mārcī est haec tabula. Cūr tū tabulam Mārcī tēcum fers? Vōsne tabulās mūtāvistis?”\n\nSextus: “Nesciēbam mē tabulam aliēnam ferre. Sed iam intellegō Mārcum tabulās mūtāvisse. Eum putō meam tabellam sūmpsisse.”\n\nSymmachus: “Cūr Mārcus tabellās mūtāvit?”\n\nDiodōrus: “Stultē interrogās, medice. Mārcus patrī suō tabellam Sextī ostendet atque dīcet ‘sē eās litterās pulchrās scrīpsisse’.”\n\nSymmachus: “Et simul Sextus patrī suō hanc tabellam ostendet atque dīcet ‘Mārcum hās litterās foedās scrīpsisse’.”\n\nDiodōrus: “Rēctē dīcis. Sed neque Iūlius, pater Mārcī, neque Cornēlius, pater Sextī, fīliō suō crēdet. Iam nōn sōlum Iūlius, sed etiam Cornēlius dīcet ‘mē esse pessimum magistrum’!”\n\nSextus: “Meus pater mihi crēdet: scit enim mē nōn mentīrī. Ego semper vērum dīcō ac parentibus meīs pāreō.”\n\nSymmachus: “Sī id vērum est, profectō nōn sōlum bonus discipulus es, sed etiam bonus fīlius.”\n\nDiodōrus: “Bonus fīlius semper rēctā viā ē lūdō domum redīre dēbet.”\n\nSextus: “Ego rēctā viā redīre soleō. Hodiē vērō Mārcus rīdēns dīxit ‘mē, ut fīliolum probum, semper rēctā viā ad mammam meam redīre!’ Ita Mārcus mē sēcum dūxit.”\n\nSymmachus: “Ergō nōn parentibus, sed Mārcō pāruistī hodiē.”\n\nSextus: “Est ut dīcis: Mārcō pāruī — sed paulō post pulsāvī eum! Iam rēctā viā domum ībō ac parentibus meīs nārrābō hoc quod vērum est: ‘Mārcum mātrem meam fēminam turpem et mē puerum barbarum appellāvisse!’ Tum māter nōn mihi, sed Mārcō īrāta erit, atque gaudēbit puerum illum improbum ā mē pulsātum esse!” Hoc dīcēns Sextus ex tabernā exit et domum īre pergit."

 {

  "cap": 22,
  "title": "Colloquium 22",
  "personae": "Dōrippa, Sanniō, Albīnus Sōla in cubiculō suō Dōrippa forem clausam aspicit, tum ad fenestram apertam accēdit, unde Tiberim flūmen spectat et pontem Fabricium, quī dūcit ad parvam īnsulam in mediō flūmine sitam.",
  "text": "Dōrippa sīc loquitur sēcum: “Quid iam hīc exspectō? Ab omnibus amīcīs relinquor. Quārē maneō in hāc urbe, ubi nēmō mihi est amīcus?” Tum oculōs terget atque ē cubiculō exit. Iānitor, cui nōmen est Sanniō, Dōrippam ēgredientem interrogat: “Quō īs, Dōrippa?” Dōrippa intrā līmen resistēns “Ad forum eō” inquit, “Nōlō sōla manēre in hāc domō. Sī Lepidus revenit, nōlī admittere eum!” Iānitor faciem Dōrippae trīstem aspiciēns “Numquam” inquit “tē trīstiōrem vīdī. Quid tibi est?”\n\nDōrippa: “Nūlla fēmina mē miserior vīvit, Sanniō. Melius est mē mortuam esse quam sine amīcīs in hāc urbe vīvere!”\n\nSanniō: “Quid ais: ‘sine amīcīs’? Nūper nōn modo Lepidus amīcus, sed etiam Lȳdia amīca tua hīc fuērunt. Ipse vīdī Lepidum flōrēs tibi afferre.” Dōrippa flōrēs extrā līmen iacentēs iānitōrī mōnstrat et “Ecce” inquit “flōrēs Lepidī in viā. Nōlō flōrēs accipere ab illō virō pōns pontis m Sanniō -ōnis m vidēre vīdisse mē (abl) miserior = miserior quam ego dare dedisse improbō. Nec hunc ānulum, quern ille mihi dedit, iam gerere volō.” Dōrippa Sanniōnī magnum ānulum aureum ostendit. “Ō, quam magnificum dōnum!” inquit Sanniō, “Tantum ānulum aureum numquam anteā mē vīdisse arbitror. Profectō vir dīvitissimus est amīcus tuus.”\n\nDōrippa: “In flūmen eum iaciam!”\n\nSanniō: “Ain’ tū? Lepidumne in flūmen iaciēs?”\n\nDōrippa: “Nōn Lepidum scīlicet, sed ānulum eius iaciam in Tiberim!”\n\nSanniō: “Nōlī stultē agere, Dōrippa, moneō tē! Tantus ānulus aureus magnī pretiī est. Quīn vēndis eum? Certē Albīnus, quī tabernam habet prope forum Rōmānum, magnum pretium dabit tibi.” At Dōrippa “Dōnum vēndere” inquit “nōn decet. Nec pecūnia mē miseram cōnsōlārī potest. Ego nōn modo hunc ānulum, sed etiam mē ipsam in Tiberim iacere volō! Valē, Sanniō!” “Manē, Dōrippa! Sāna nōn es” inquit iānitor, nec vērō puellam miseram retinēre potest. Dōrippa rēctā viā ad Tiberim flūmen it ac statim pontem Fabricium intrat. In mediō ponte cōnsistit atque aquam spectat sub ponte fluentem. In speculō aquae videt imāginem suam. Puella tremēns atque horrēns oculōs claudit, deinde sē vertit ac pontem relinquit. Quō it Dōrippa? Ad forum versus it. In viā quae ad forum dūcit\n\nAlbīnum clāmāre audit: “Ōrnāmenta! Emite ōrnāmenta!” Dōrippa ad tabernam accēdit. “Salvē, Dōrippa!” inquit Albīnus, “Vīsne ōrnāmentum?”\n\nDōrippa: “Nōlō ōrnāmentum emere, sed hunc ānulum aureum vēndere volō. Quantum pretium mihi dabis?” Albīnus, postquam ānulum in manūs sūmpsit, “Nōn magnī pretiī” inquit “est iste ānulus.”\n\nDōrippa: “Quantum dabis?”\n\nAlbīnus: “Octō sēstertiōs.”\n\nDōrippa: “Mē dērīdēs! Putāsne mē tantum atque tam pulchrum ānulum aureum octō sēstertiīs vēndere. Nōn sum ego tam stulta!” “Iste ānulus nōn est aureus” inquit Albīnus, “Audī!” et ānulum in mēnsam iacit.\n\nĀnulus tinnit: “Tintintin . . .”\n\nDōrippa: “Ānulum tinnīre audiō. Quid igitur?”\n\nAlbīnus: “Nōn ut aurum, sed ut ferrum tinnit iste ānulus: est ānulus ferreus aurō opertus. Nunc vērō audī ānulum aureum!” Albīnus ānulum aureum prōmit eumque iacit in mēnsam.\n\nDōrippa: “Certē nōn eōdem modō tinniunt ānulī.”\n\nAlbīnus: “Neque eiusdem pretiī sunt. Hic ānulus ex aurō pūrō factus est, ānulus tuus ex ferrō, quod tenuī aurō operītur. Bene factus est ānulus tuus, nec tamen mē fallere potes.”\n\nDōrippa: “Nōlō ego tē fallere, Albīne. Iam vērō intellegō Lepidum, quī ānulum ferreum mihi dedit, falsum amīcum esse. Quantī est ānulus aureus?” Albīnus Dōrippae ānulum aureum gemmātum ostendit et “Hic ānulus” inquit “centum sēstertiīs cōnstat. Tālem ānulum habet amīca tua Lȳdia.”\n\nDōrippa: “Quōmodo Lȳdia tantō pretiō ānulum emere potuit?”\n\nAlbīnus: “Ipsa tantam pecūniam nōn habet, sed nūper ad tabernam meam vēnit cum amīcō pecūniōsō, quī nummīs numerātīs ānulum aureum gemmātum ēmit et Lȳdiae dedit.”\n\nDōrippa: “Facile erat amīcum Lȳdiae fallere. Cūr nōn ānulum ferreum eī vēndidistī?”\n\nAlbīnus: “Ego ānulōs ferreōs neque emō neque vēndō.” Dōrippa ānulum suum capit et iterum ad Tiberim flūmen abit. operīre operuisse opertum esse quantī est? = quantī pretiī est? posse potuisse vēndere vēndidisse"

  "personae": "Iānitor, Tlēpolemus, Dāvus dī-mittere dī-mīsisse dī-missum esse red-īre red-iisse red-itūrum esse (inf fut) A α : alpha B β : bēta Г γ : gamma In vīllā Iūliī Tlēpolemus, postquam epistulam iānitōrī trādidit, intrā forēs respōnsum Iūliī exspectat. Canis īrātus dentēs ostendit ac fremit. Tabellārius vērō canem vīnctum nōn timet. Paulō post redit iānitor. “Epistulam” inquit “dominō trādidī; ille mē dīmīsit sine respōnsō. Necesse est tē respōnsum opperīrī.”",
  "text": "Tlēpolemus: “Sed erō meō prōmīsī ‘mē brevī tempore reditūrum esse.’ Neque enim aliōs habet servōs.”\n\nIānitor: “Quis est iste dominus pauper cui ūnus servus est?”\n\nTlēpolemus: “Est Diodōrus, lūdī magister. Certē nōn dīves est erus meus, sed vir doctus est, quī multōs librōs habet et Latīnōs et Graecōs.”\n\nIānitor: “Sed magnī pretiī sunt librī. Quōmodo pauper magister tot librōs emere potest?”\n\nTlēpolemus: “Erus meus nec uxōrem nec līberōs habet. Nōn multum eī necessārium est, nec vērō sine librīs potest vīvere. Cum puerōs nōn docet, librōs legit philosophōrum Graecōrum. Nōn putō eum umquam ante mediam noctem dormītum īre.”\n\nIānitor: “Ego sine librīs bene vīvō, neque enim legere sciō. Tūne scīs Graecē legere?”\n\nTlēpolemus: “Sciō nōmina litterārum: alpha, bēta, gamma . . .”\n\nIānitor: “Nōlī mihi Graecē loquī! Eam linguam nōn intellegō.”\n\nTlēpolemus: “Graecē nec loquī nec legere sciō, sed sciō Latīnē legere.”\n\nIānitor: “Ergō lege mihi id quod in solō īnscrīptum est īnfrā hanc imāginem.”\n\nTlēpolemus: “c-a ca, v-e vē: ca-vē, c-a ca, n-e-m nem: canem: cavē canem!”\n\nIānitor: “Profectō vir doctus es!”\n\nTlēpolemus: “Nōn tam doctus quam erus meus. Nēmō mē legere docuit; sed saepe Diodōrum puerōs docentem audiō, ita litterās et syllabās discō.”\n\nIānitor: “Meus quoque dominus est vir doctus, ego vērō servus indoctus sum ac stultus. Litterās Latīnās nesciō. Dominus dīcit ‘mē tam stultum esse quam canem meum!’”\n\nTlēpolemus: “Fortasse nōn tam stultus est canis tuus: certē ūnam litteram scit.”\n\nIānitor: “Quam litteram?” “Canis īrātus r litteram plānius dīcit quam homō” inquit Tlēpolemus baculum tollēns, “Audī!”\n\nCanis rūrsus fremere incipit: “Rrrr!” Tum vērō, tonitrū territus, post iānitōrem recēdit atque ululāre incipit: “Uuuū!” “Atque canis territus tam plānē dīcit litteram V” inquit iānitor, “Sed stultus est quod tonitrū terrētur.”\n\nTlēpolemus: “Nōn stultus, sed prūdēns est quī tonitrum metuit.” Exit Dāvus ex ātriō; quī tabellārium cōnspiciēns “Quārē hīc manēs?” inquit, “Quid exspectās?”\n\nTlēpolemus: “Respōnsum exspectō dominī tuī.”\n\nDāvus: “Tempus perdis. Tibi respōnsum nōn dabitur hodiē, crās magistrō dabitur ā Mārcō. Quīn hinc discēdis? Num quid vīs?” “Nōlō plūs temporis perdere. Redeō ad dominum meum. Valēte!” inquit Tlēpolemus, atque ab iīs discēdit. v littera dīcitur ‘ū’"

  "title": "Colloquium 24",
  "personae": "Diodorūs, Symmachus, Tlēpolemus ab-īre ab-iisse fūmus -ī m ignis -is m domus ārdet Postquam Sextus abiit, magister pōculum suum exhaurit et “Ego quoque” inquit “redīre volō, etsī nēmō domī mē opperītur.”",
  "text": "Symmachus: “Nōnne iānitor cūstōdit domum tuam?”\n\nDiodōrus: “Mihi, ut magistrō pauperrimō, ūnus tantum est servus, neque is nunc domī est.”\n\nSymmachus: “Quid servus tuus agit forīs?”\n\nDiodōrus: “Multa sunt servī meī officia. Hodiē tabellārius est: epistulam fert ad patrem Mārcī, neque eum ante hōram nōnam reditūrum esse putō. Sed eō absente canis meus ferōx domum cūstōdit.”\n\nSymmachus: “Ergō nōn opus est tē iam redīre. Quīn hīc exspec­ tās dum dēsinit imber ac tonitrus? Mox sōl rūrsus lūcēbit.” Diodōrus caelum spectāns “Id nōn arbitror” inquit, “Ecce nova nūbēs ātra oritur.” Item Symmachus caelum intuētur et “Nōn nūbēs” inquit, “sed fūmus est.”\n\nDiodōrus: “Fūmus? Unde venit ille fūmus?”\n\nSymmachus: “Semper ex igne venit fūmus. Ego aliquam domum ārdēre putō.” Subitō aliquis magnā vōce “Incendium!” clāmāre incipit, atque brevī tempore viae oppidī implentur hominibus, quī omnēs in eam partem currunt unde fūmus oritur. Diodōrus quoque et Symmachus ē tabernā exeunt atque cēterōs sequuntur. “Quō īmus?” interrogat Diodōrus. “In eam partem ubi tū habitās, putō” respondet Symmachus. Diodōrus quoque currere incipit. Paulō post Diodōrus ante domum suam ārdentem cōnsistit. Intrā forēs clausās canis vīnctus ululat. “Age, aperī iānuam, Diodōre! Solve canem tuum!” clāmat aliquis, dum aliī magnō cum strepitū forēs frangere cōnantur. Diodōrus continuō clāvem prōmit, forēs aperit et canem territum solvit. Canis laetus ē domō excurrit. At dominus, etsī propter fūmum crassum vix spīrāre potest, in mediam domum prōcēdit librōs suōs quaerēns. Tandem, ūnō librō captō, recēdit, ac vix vīvus intrā forēs lābitur. Eō ipsō tempore Tlēpolemus revertitur. “Ubi est erus meus?” inquit. “Intrā līmen iacet” respondet aliquis, “Tū servā dominum tuum!” Vix haec verba dicta erant, cum Tlēpolemus per forēs apertās currit, dominum iacentem tollit eumque extrā forēs portat. Diodōrus, quī ūnum librum manū tenet, oculōs aperit. “Ō domine!” inquit Tlēpolemus, “Gaudeō tē vīvere!” At magister “Mēne vīvere” inquit “sine domō ac sine librīs?” Hīc advenit Symmachus et “Ō mī Diodōre!” inquit, “Quid tibi factum est?”\n\nDiodōrus: “Nōnne vidēs domum meam ārdēre? Iuppiter mē perdidit. Egone hoc meruī? Quid male fēcī? Cūr mē sīc pūnīvit Iuppiter?”\n\nSymmachus: “Ipse dīcis ‘tē deōs nōn verērī.’ Cūr igitur putās tē ā Iove pūnītum esse?” incendium -ī n = domus ārdēns ex-currere capere cēpisse captum esse ex-īre ex-iisse con-currere = simul in eundem locum currere\n\nDiodōrus: “Quia Iuppiter est deus caelī quī tonitrum ac fulgura efficit. Ille domum meam perdidit. Mihi necesse erit sub caelō apertō vīvere!”\n\nSymmachus: “Certē sub tēctō vīvēs, Diodōre. Venī apud mē habitātum. Domus mea satis magna est.”\n\nDiodōrus: “Quid fīet lūdō ac discipulīs meīs?”\n\nSymmachus: “Nūper dīxistī ‘tē lūdum clausūrum esse.’ Iam clausus est lūdus. Discipulī tuī novum magistrum quaerent. Neque iam opus est tē puerōs improbōs docēre: omne tempus tibi vacuum est ad librōs tuōs.”\n\nDiodōrus: “Quid mē dērīdēs, Symmache? Ex omnibus librīs meīs ūnum tantum servāvī.”\n\nSymmachus: “Quōmodo librum ex incendiō servāvistī? Tūne sōlus domum ārdentem intrāvistī?”\n\nDiodōrus: “Sōlus intrāvī, nex sōlus illinc exiī: servus meus, quī interim advēnerat, mē vix vīvum ē domō ārdentī tulit. Ecce servus fortis quī erum suum servāvit.”\n\nTlēpolemus: “Antequam ego erum servāvī, ille canem suum servāverat.” “Nec sōlum canem servāveram, sed etiam hunc librum” inquit Diodōrus et medicō librum ostendit.\n\nSymmachus: “Quī liber est iste?” Diodōrus titulum aspiciēns “Lucrētiī” inquit “Dē rērum nāturā liber sextus. Is est liber dē caelō ac dē tonitrū fulguribusque.”\n\nSymmachus: “Quid dīcit Lucrētius dē causā tonitrūs?”\n\nDiodōrus: “Lucrētius dīcit ‘tonitrum fierī quia nūbēs volantēs in caelō concurrunt ventīs pugnantibus . . .’ Certē negat ‘Iovem facere tonitrum’.”\n\nSymmachus: “Neque igitur Iuppiter tē pūnīvit.”"

/* 3ª declinação: gen. pl. -um mesmo sendo parissílabo */
const NO_IUM = new Set(["canis", "iuvenis", "pater", "māter", "frāter", "senex", "mēnsis"]);
/* neutros -i da 3ª */
const NEUT_I = new Set(["mare", "animal"]);

const mNorm = s => (s || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "");

/* ---------- classificação de um item do vocabulário ---------- */
function nounClass(v) {
  const la = v.la.split(/[ ,(/]/)[0];
  const f = v.forms || "";
  if (/v\.|adv|conj|prep|interj|indecl|num\.|pron|loc\./.test(f)) return null;
  const g = /(\bf\.?\b)/.test(f) ? "f" : /(\bn\.?\b)/.test(f) ? "n" : /(\bm\.?\b)/.test(f) ? "m" : null;
  if (!g) return null;
  const plOnly = /pl\./.test(f);

  // 5ª: -ēī / -eī / "reī f."
  if ((f.includes("-ēī") || f.includes("-eī") || /(ēī|eī)/.test(f)) && la.endsWith("ēs"))
    return { la, decl: "d5", stem: la.replace(/ēs$/, ""), g, plOnly };
  // 4ª: -ūs
  if (f.includes("-ūs")) {
    if (g === "n") return { la, decl: "d4n", stem: la.replace(/ū$/, ""), g, plOnly };
    return { la, decl: "d4", stem: la.replace(/us$/, ""), g, plOnly };
  }
  // 1ª: -ae
  if (f.includes("-ae") && la.endsWith("a")) return { la, decl: "d1", stem: la.slice(0, -1), g, plOnly };
  if (f.includes("-ārum")) return { la, decl: "d1", stem: la.replace(/ae$/, ""), g, plOnly: true };
  // 2ª  (atenção: \b não funciona após vogal com macron — usar includes/regex unicode)
  if (f.includes("-ī") || f.includes("-ōrum") || /^[^\s-]*[a-zāēōū]rī(\s|$)/.test(f) || /^[^\s-]+ī(\s|$)/.test(f)) {
    if (g === "n") {
      const stem = la.endsWith("um") ? la.slice(0, -2) : la.replace(/a$/, "");
      return { la, decl: "d2n", stem, g, plOnly: plOnly || /-ōrum/.test(f) && la.endsWith("a") };
    }
    if (la.endsWith("us")) return { la, decl: "d2m", stem: la.slice(0, -2), g, plOnly };
    if (la.endsWith("ī")) return { la, decl: "d2m", stem: la.slice(0, -1), g, plOnly: true }; // līberī
    // -er / -ir: genitivo no forms (ex.: "librī m." / "puerī m." / "-brī m.")
    const m = f.match(/^-?([a-zāēīōūȳ]+)ī(\s|$|\.)/);
    let stem = la;
    if (m) {
      const tok = m[1];
      if (f.startsWith("-")) { // "-chra" style: substitui o fim
        stem = la.slice(0, la.length - (tok.length - 1)) ; // aproximação
        // melhor: acha overlap
        stem = mergeStem(la, tok);
      } else stem = tok;
    }
    return { la, decl: "d2r", stem, g, plOnly };
  }
  // 3ª
  if (/-is\b|-.*is\b|is f|is m|tis|dis|nis|ris|bis/.test(f) || GEN3[la] !== undefined) {
    let stem = GEN3[la];
    if (stem === null) return null;
    if (!stem) {
      const m = f.match(/-([a-zāēīōūȳ]*)is\b/);
      if (m && m[1]) stem = mergeStem(la, m[1]);
      else if (la.endsWith("is") || la.endsWith("ēs")) stem = la.slice(0, -2);
      else return null;
    }
    if (g === "n") {
      const decl = NEUT_I.has(la) ? "d3ni" : "d3n";
      return { la, decl, stem, g, plOnly };
    }
    // tema em -i: parissílabo em -is/-ēs, ou tema com 2 consoantes finais
    const pari = (la.endsWith("is") || la.endsWith("ēs")) && !NO_IUM.has(la);
    const twoCons = /[bcdfgklmnprstvx]{2}$/.test(mNorm(stem)) && !NO_IUM.has(la);
    return { la, decl: (pari || twoCons) ? "d3i" : "d3", stem, g, plOnly };
  }
  return null;
}
/* junta lema + pedaço do genitivo: pāstor + ōris → pāstōr- */
function mergeStem(la, genPart) {
  const nLa = mNorm(la), nGp = mNorm(genPart);
  for (let k = Math.min(nGp.length, nLa.length); k > 0; k--) {
    if (nLa.endsWith(nGp.slice(0, k))) return la.slice(0, la.length - k) + genPart;
  }
  return la.replace(/[aeiouāēīōū]?s?$/, "") + genPart;
}

/* adjetivos: retorna {type:'adj12'|'adj3', stem} */
function adjClass(v) {
  const la = v.la.split(/[ ,(/]/)[0];
  const f = v.forms || "";
  if (/^-a -um/.test(f)) return { la, type: "adj12", stem: la.replace(/us$/, "") };
  const mEr = f.match(/^-([a-zāēīōūȳ]+)ra -[a-zāēīōūȳ]+um/); // pulcher -chra -chrum
  if (mEr) return { la, type: "adj12", stem: mergeStem(la, mEr[1] + "r") };
  if (/^-e\b/.test(f)) return { la, type: "adj3", stem: la.replace(/is$/, "") };
  if (/^-(ant|ent)is/.test(f)) return { la, type: "adj3x", stem: mergeStem(la, f.match(/^-([a-zāēīōūȳ]+)is/)[1]) };
  return null;
}

/* ---------- gera tabela completa {sg:[5], pl:[5]} ---------- */
function declineNoun(cls) {
  const e = NOUN_ENDINGS[cls.decl];
  const row = n => e[n].map((end, i) => {
    if (end === null) {
      if (i === 0) return cls.la;            // nom sg = lema
      if (i === 1) return cls.la;            // acus sg neutro = nom
      return null;
    }
    return cls.stem + end;
  });
  return { sg: cls.plOnly ? null : row("sg"), pl: row("pl") };
}

/* ---------- análise: dado a forma clicada + entrada do dicionário ---------- */
function analyzeForm(surface, entry) {
  const cls = nounClass(entry) || null;
  const results = [];
  const nSurf = mNorm(surface);
  if (cls) {
    const t = declineNoun(cls);
    ["sg", "pl"].forEach(num => {
      if (!t[num]) return;
      t[num].forEach((form, i) => {
        if (form && mNorm(form) === nSurf)
          results.push({ kind: "noun", cls, case: CASES[i], caseIdx: i, num, table: t });
      });
    });
    if (results.length) return results;
    if (t) return [{ kind: "noun", cls, case: null, num: null, table: t }]; // tabela sem célula exata
  }
  const adj = adjClass(entry);
  if (adj) return [{ kind: "adj", adj }];
  // verbo: análise por terminação (heurística)
  if (/^v\.|v\. |dep/.test(entry.forms || "") || entry.forms === "v.") {
    const g = verbGuess(nSurf);
    if (g) return [{ kind: "verb", guess: g }];
  }
  // glosas funcionais (formas flexionadas do EXTRA_GLOSS): só padrões verbais fortes
  if (entry.fn) {
    const g = verbGuess(nSurf, true);
    if (g) return [{ kind: "verb", guess: g }];
  }
  return null;
}

/* heurística de terminações verbais → descrição PT */
function verbGuess(n, strict) {
  const R = [
    [/(ba)m$/, "1ª sing. do imperfeito (eu …va)"], [/bās$/, "2ª sing. do imperfeito"],
    [/bat$/, "3ª sing. do imperfeito (ele …va)"], [/bāmus$/, "1ª pl. do imperfeito"],
    [/bant$/, "3ª pl. do imperfeito (eles …vam)"], [/bātur$/, "3ª sing. do imperfeito passivo"],
    [/bantur$/, "3ª pl. do imperfeito passivo"],
    [/bō$/, "1ª sing. do futuro (eu …rei)"], [/bit$/, "3ª sing. do futuro"],
    [/bunt$/, "3ª pl. do futuro"], [/bitur$/, "3ª sing. do futuro passivo"],
    [/(āv|ēv|īv|u|s|x)it$/, "3ª sing. do perfeito (ele …ou)"],
    [/ērunt$/, "3ª pl. do perfeito (eles …aram)"], [/(āv|ēv|īv)ī$/, "1ª sing. do perfeito (eu …ei)"],
    [/istī$/, "2ª sing. do perfeito"], [/erat$/, "3ª sing. do mais-que-perfeito (tinha …)"],
    [/erant$/, "3ª pl. do mais-que-perfeito"], [/erit$/, "3ª sing. do futuro perfeito ou subj. perfeito"],
    [/isse$/, "infinitivo perfeito"], [/ntur$/, "3ª pl. passiva/depoente"],
    [/tur$/, "3ª sing. passiva/depoente"], [/minī$/, "2ª pl. passiva/depoente"],
    [/mur$/, "1ª pl. passiva/depoente"], [/or$/, "1ª sing. passiva/depoente (sou …)"],
    [/ris$/, "2ª sing. passiva/depoente"], [/mus$/, "1ª pl. (nós …mos)"],
    [/tis$/, "2ª pl. (vós …is)"], [/nt$/, "3ª pl. (eles …m)"],
    [/(āre|ēre|ere|īre|ārī|ērī|īrī|ī)$/, "infinitivo"],
    [/ns$/, "particípio presente (que …)"], [/ntem$/, "particípio presente (acus.)"],
    [/ndum$/, "gerúndio/gerundivo"], [/ndī$/, "gerúndio (gen.)"],
    [/(t|s)us$/, "particípio perfeito passivo (…ado/ido)"],
    [/ūrus$/, "particípio futuro (que vai …)"],
    [/t$/, "3ª sing. do presente (ele …)"], [/s$/, "2ª sing. do presente (tu …s)"], [/ō$/, "1ª sing. do presente (eu …o)"]
  ];
  const list = strict ? R.slice(0, R.length - 3) : R;
  for (const [re, desc] of list) if (re.test(n)) return desc;
  return null;
}

/* ============================================================
   CONJUGAÇÕES — modelos completos (gerados)
   ============================================================ */
const VERB_MODELS = [
  { id: "am", inf: "amāre", pt: "amar", conj: "1ª (-āre)", pres: "am", perf: "amāv", sup: "amāt", tv: "ā" },
  { id: "mon", inf: "monēre", pt: "advertir", conj: "2ª (-ēre)", pres: "mon", perf: "monu", sup: "monit", tv: "ē" },
  { id: "leg", inf: "legere", pt: "ler", conj: "3ª (-ere)", pres: "leg", perf: "lēg", sup: "lēct", tv: "e" },
  { id: "aud", inf: "audīre", pt: "ouvir", conj: "4ª (-īre)", pres: "aud", perf: "audīv", sup: "audīt", tv: "ī" }
];
const PERSONS = ["ego", "tū", "is/ea", "nōs", "vōs", "iī/eae"];
function conjTable(m) {
  const p = m.pres, pf = m.perf, tv = m.tv;
  const third = m.id === "leg", fourth = m.id === "aud";
  const futStem = (third || fourth) ? null : tv + "b";
  const t = {};
  t["presente"] = third ? [p+"ō", p+"is", p+"it", p+"imus", p+"itis", p+"unt"]
    : fourth ? [p+"iō", p+"īs", p+"it", p+"īmus", p+"ītis", p+"iunt"]
    : [m.id==="am" ? p+"ō" : p+"eō", p+tv+"s", p+tv.replace("ē","e").replace("ā","a")+"t", p+tv+"mus", p+tv+"tis", m.id==="am" ? p+"ant" : p+"ent"];
  const impStem = third ? p+"ēb" : fourth ? p+"iēb" : p+tv+"b";
  t["imperfeito"] = ["am","ās","at","āmus","ātis","ant"].map(e=>impStem+e);
  t["futuro"] = (third||fourth)
    ? ["am","ēs","et","ēmus","ētis","ent"].map(e=>(fourth?p+"i":p)+e)
    : ["ō","is","it","imus","itis","unt"].map(e=>futStem+e);
  t["perfeito"] = ["ī","istī","it","imus","istis","ērunt"].map(e=>pf+e);
  t["mais-que-perfeito"] = ["eram","erās","erat","erāmus","erātis","erant"].map(e=>pf+e);
  t["futuro perfeito"] = ["erō","eris","erit","erimus","eritis","erint"].map(e=>pf+e);
  t["subj. presente"] = third ? ["am","ās","at","āmus","ātis","ant"].map(e=>p+e)
    : fourth ? ["am","ās","at","āmus","ātis","ant"].map(e=>p+"i"+e)
    : m.id==="am" ? ["em","ēs","et","ēmus","ētis","ent"].map(e=>p+e)
    : ["eam","eās","eat","eāmus","eātis","eant"].map(e=>p+e);
  const infB = m.inf.slice(0, -1); // amār-
  t["subj. imperfeito"] = [m.inf+"m", infB+"ēs", m.inf+"t", infB+"ēmus", infB+"ētis", m.inf+"nt"];
  t["subj. perfeito"] = ["erim","erīs","erit","erīmus","erītis","erint"].map(e=>pf+e);
  t["subj. mais-que-perf."] = ["issem","issēs","isset","issēmus","issētis","issent"].map(e=>pf+e);
  return t;
}
const ESSE_TABLE = {
  "presente": ["sum","es","est","sumus","estis","sunt"],
  "imperfeito": ["eram","erās","erat","erāmus","erātis","erant"],
  "futuro": ["erō","eris","erit","erimus","eritis","erunt"],
  "perfeito": ["fuī","fuistī","fuit","fuimus","fuistis","fuērunt"],
  "mais-que-perfeito": ["fueram","fuerās","fuerat","fuerāmus","fuerātis","fuerant"],
  "futuro perfeito": ["fuerō","fueris","fuerit","fuerimus","fueritis","fuerint"],
  "subj. presente": ["sim","sīs","sit","sīmus","sītis","sint"],
  "subj. imperfeito": ["essem","essēs","esset","essēmus","essētis","essent"]
};

/* ============================================================
   DRILL adaptativo (Declinā!)
   ============================================================ */
function gramKey(type, a, b) { return `${type}|${a}|${b}`; }
function gramStat(k) { return (S.gram && S.gram[k]) || { ok: 0, bad: 0 }; }
function gramAcc(k) { const s = gramStat(k); const n = s.ok + s.bad; return n === 0 ? null : s.ok / n; }
function gramRecord(k, ok) {
  if (!S.gram) S.gram = {};
  if (!S.gram[k]) S.gram[k] = { ok: 0, bad: 0 };
  S.gram[k][ok ? "ok" : "bad"]++;
  save();
}

/* pool de substantivos decliáveis já estudados */
function drillNounPool() {
  const learned = new Set(Object.values(S.srs || {}).map(x => x.cap));
  const maxCap = Math.max(2, maxUnlockedCap());
  const pool = [];
  COURSE.forEach(ch => {
    if (ch.num > maxCap) return;
    ch.vocab.forEach(v => {
      const c = nounClass(v);
      if (c && !c.plOnly) pool.push({ v, cls: c });
    });
  });
  return pool;
}

function makeGramExercise() {
  const pool = drillNounPool();
  const useVerb = Math.random() < 0.35 && maxUnlockedCap() >= 15;
  if (useVerb) {
    const m = VERB_MODELS[Math.floor(Math.random() * VERB_MODELS.length)];
    const table = conjTable(m);
    const maxCapN = maxUnlockedCap();
    let tenses = ["presente"];
    if (maxCapN >= 19) tenses.push("imperfeito");
    if (maxCapN >= 20) tenses.push("futuro");
    if (maxCapN >= 21) tenses.push("perfeito");
    if (maxCapN >= 24) tenses.push("mais-que-perfeito");
    if (maxCapN >= 27) tenses.push("subj. presente");
    if (maxCapN >= 28) tenses.push("subj. imperfeito");
    if (maxCapN >= 30) tenses.push("futuro perfeito");
    // pondera pro tempo mais fraco
    tenses.sort((a, b) => (gramAcc(gramKey("v", m.conj, a)) ?? .5) - (gramAcc(gramKey("v", m.conj, b)) ?? .5));
    const tense = Math.random() < .6 ? tenses[0] : tenses[Math.floor(Math.random() * tenses.length)];
    const pi = Math.floor(Math.random() * 6);
    const answer = table[tense][pi];
    const wrong = shuffle(Object.entries(table).flatMap(([tn, fs]) => tn === tense ? fs.filter((f,i)=>i!==pi) : [fs[pi]])).slice(0, 3);
    return { kind: "v", key: gramKey("v", m.conj, tense),
      prompt: `<span class="la">${m.inf}</span> (${m.pt}) — <b>${PERSONS[pi]}</b>, ${tense}:`,
      options: shuffle([answer, ...wrong].filter((x,i,a)=>a.indexOf(x)===i).slice(0,4)), answer };
  }
  const { v, cls } = pool[Math.floor(Math.random() * pool.length)];
  const t = declineNoun(cls);
  // pondera pra célula mais fraca da declinação
  const cells = [];
  ["sg", "pl"].forEach(num => { if (t[num]) t[num].forEach((f, i) => { if (f) cells.push({ num, i, f }); }); });
  cells.sort((a, b) => (gramAcc(gramKey("n", cls.decl, CASES[a.i] + a.num)) ?? .5) - (gramAcc(gramKey("n", cls.decl, CASES[b.i] + b.num)) ?? .5));
  const cell = Math.random() < .6 ? cells[0] : cells[Math.floor(Math.random() * cells.length)];
  const answer = cell.f;
  const wrong = shuffle(cells.filter(c => c.f !== answer).map(c => c.f)).slice(0, 3);
  return { kind: "n", key: gramKey("n", cls.decl, CASES[cell.i] + cell.num),
    prompt: `<span class="la">${v.la}</span> (${v.pt}) — <b>${CASES[cell.i]} ${cell.num === "sg" ? "singular" : "plural"}</b>:`,
    hint: DECL_LABEL[cls.decl],
    options: shuffle([answer, ...wrong].filter((x,i,a)=>a.indexOf(x)===i).slice(0,4)), answer };
}

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const norm = s => (s || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "").replace(/[^a-z]/g, "");
const normPhrase = s => (s || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "").replace(/[^a-z\s]/g, "").replace(/\s+/g, " ").trim();
const shuffle = a => { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; };
const esc = s => (s || "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const todayKey = () => new Date().toISOString().slice(0, 10);

/* ---------- state ---------- */
const DEFAULT_STATE = { xp: 0, streak: 0, lastDay: null, lessons: {}, srs: {}, words: {}, readFab: {}, rate: 0.85, gram: {} };
let S = loadState();
function loadState() {
  try { return Object.assign({}, DEFAULT_STATE, JSON.parse(localStorage.getItem("latinum") || "{}")); }
  catch { return { ...DEFAULT_STATE }; }
}
function save() {
  S.savedAt = Date.now();
  localStorage.setItem("latinum", JSON.stringify(S));
  scheduleCloudPush();
}

];
const rankFor = xp => RANKS.slice().reverse().find(r => xp >= r.xp);

/* ---------- dictionary (course vocab + extras) ---------- */
const DICT = [];
COURSE.forEach(ch => ch.vocab.forEach(v => DICT.push({ ...v, cap: ch.num })));
NOMINA.forEach(n => DICT.push({ la: n.la, forms: "nome próprio", pt: n.pt, ex: "", cap: 0 }));
Object.entries(EXTRA_GLOSS).forEach(([la, pt]) => DICT.push({ la, forms: "", pt, ex: "", cap: 0, fn: true }));

const ENDINGS = ["orum", "arum", "ibus", "erunt", "isti", "imus", "itis", "ntur", "tur", "mus", "tis", "unt", "ent", "ant", "int", "am", "as", "at", "em", "es", "et", "is", "it", "os", "us", "um", "ae", "is", "o", "a", "e", "i", "u", "s", "t", "m", ""];
function stemOf(w) { // crude stem: strip one common ending
  for (const e of ENDINGS) if (e && w.length - e.length >= 3 && w.endsWith(e)) return w.slice(0, -e.length);
  return w;
}
const DICT_INDEX = {};   // exact normalized headword(s) -> entry
const DICT_STEMS = [];   // {stem, entry}
DICT.forEach(en => {
  en.la.split(/[,;·…]| — /).forEach(part => {
    part.split(/\s+/).forEach(tok => {
      const n = norm(tok);
      if (n.length > 1 && !DICT_INDEX[n]) DICT_INDEX[n] = en;
    });
    const n = norm(part.replace(/\s+/g, ""));
    if (n && !DICT_INDEX[n]) DICT_INDEX[n] = en;
  });
  const head = norm(en.la.split(/[,\s]/)[0]);
  if (head.length >= 3 && !en.fn) DICT_STEMS.push({ stem: stemOf(head), entry: en });
});
/* índice de TODAS as formas declinadas (gerado pelo motor de morfologia) */
const FORM_INDEX = {};
if (typeof nounClass === "function") {
  DICT.forEach(en => {
    if (en.fn) return;
    try {
      const cls = nounClass(en);
      if (!cls) return;
      const t = declineNoun(cls);
      ["sg", "pl"].forEach(num => (t[num] || []).forEach(f => {
        if (f) { const k = norm(f); if (k.length > 1 && !FORM_INDEX[k]) FORM_INDEX[k] = en; }
      }));
    } catch (e) { /* ignora entradas que o motor não parseia */ }
  });
}

function lookup(word) {
  const n = norm(word);
  if (!n) return null;
  const exact = DICT_INDEX[n];
  // forma declinada real ganha de glosa funcional manual (análise mais rica)
  if (exact && !(exact.fn && FORM_INDEX[n])) return exact;
  if (FORM_INDEX[n]) return FORM_INDEX[n];
  if (exact) return exact;
  // try stripping enclitic -que / -ne
  for (const enc of ["que", "ne"]) {
    if (n.endsWith(enc) && DICT_INDEX[n.slice(0, -enc.length)]) return DICT_INDEX[n.slice(0, -enc.length)];
  }
  // stem match: longest stem that prefixes the word, remainder ≤ 4 chars
  let best = null;
  const ws = stemOf(n);
  for (const { stem, entry } of DICT_STEMS) {
    if ((n.startsWith(stem) && n.length - stem.length <= 4) || ws === stem) {
      if (!best || stem.length > best.stem.length) best = { stem, entry };
    }
  }
  return best ? best.entry : null;
}

/* ---------- TTS ---------- */
let VOICE = null;
function pickVoice() {
  const vs = speechSynthesis.getVoices();
  VOICE = vs.find(v => v.lang === "it-IT") || vs.find(v => v.lang.startsWith("it")) ||
    vs.find(v => v.lang.startsWith("es")) || vs.find(v => v.lang.startsWith("pt")) || null;
}
if ("speechSynthesis" in window) {
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text) {
  if (!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const plain = text.normalize("NFD").replace(/[̀-ͯ]/g, "").replace(/[ȳȲ]/g, "y");
  const u = new SpeechSynthesisUtterance(plain);
  if (VOICE) u.voice = VOICE;
  u.lang = VOICE ? VOICE.lang : "it-IT";
  u.rate = S.rate || 0.85;
  speechSynthesis.speak(u);
}
function stopSpeak() {
  if ("speechSynthesis" in window) speechSynthesis.cancel();
}
const RATES = [0.5, 0.6, 0.7, 0.85, 1.0, 1.15, 1.3];
function changeRate(dir) {
  let i = RATES.indexOf(S.rate);
  if (i === -1) i = 3;
  i = Math.min(RATES.length - 1, Math.max(0, i + dir));
  S.rate = RATES[i];
  save();
  document.querySelectorAll(".tts-rate").forEach(el => el.textContent = rateLabel());
  toast(`${dir < 0 ? "🐢" : "🐇"} Velocidade: ${rateLabel()}`);
  // efeito imediato: a Web Speech não muda o rate de fala em andamento,
  // então reinicia a frase atual na velocidade nova
  if (window._ab && speechSynthesis.speaking) {
    if (window._ab.playing) abSpeakSentence(window._ab.i);
    else abSpeakSentence0(window._ab.i);
  }
}
function rateLabel() { return (S.rate || 0.85).toFixed(2).replace(/0$/, "") + "×"; }
function ttsControls(js) {
  return `<div class="tts-row">
    <button class="speak-btn" onclick="${js}">🔊 ouvir</button>
    <button class="speak-btn" onclick="stopSpeak()" title="parar leitura">⏹ parar</button>
    <button class="speak-btn" onclick="changeRate(-1)" title="mais devagar">🐢</button>
    <span class="tts-rate">${rateLabel()}</span>
    <button class="speak-btn" onclick="changeRate(1)" title="mais rápido">🐇</button>
  </div>`;
}

/* ---------- streak / xp ---------- */
function addXP(n) {
  S.xp += n;
  const t = todayKey();
  if (!S.day || S.day.date !== t) S.day = { date: t, xp: 0, hit: false };
  S.day.xp += n;
  if (S.day.xp >= 30 && !S.day.hit) { S.day.hit = true; setTimeout(() => toast("🎯 Meta diária batida — 30 XP! Optimē!"), 600); }
  save(); renderStats();
}
function bumpStreak() {
  const t = todayKey();
  if (S.lastDay === t) return;
  const y = new Date(Date.now() - 864e5).toISOString().slice(0, 10);
  S.streak = (S.lastDay === y) ? S.streak + 1 : 1;
  S.lastDay = t;
  save();
}
function renderStats() {
  $("#stat-streak").textContent = S.streak;
  $("#stat-xp").textContent = S.xp;
  $("#stat-words").textContent = Object.values(S.words).filter(v => v === 2).length + Object.keys(S.srs).filter(k => (S.srs[k].reps || 0) >= 3).length;
  $("#stat-rank").textContent = rankFor(S.xp).name;
  const due = dueWords().length + dueSents().length;
  const b = $("#review-badge");
  b.hidden = due === 0;
  b.textContent = due;
  renderSyncChip();
}

/* ---------- SRS: SM-2 (SuperMemo-2, o algoritmo do Anki) ----------
   Wozniak 1987; curva do esquecimento de Ebbinghaus; spacing effect
   (Cepeda et al. 2006). Cada item tem um fator de facilidade (EF) que
   estica o intervalo a cada acerto e encolhe com os erros.            */
const INTERVALS = [1, 2, 4, 8, 16, 32, 64]; // legado (migração)
function sm2Update(it, ok, typed) {
  // migra itens antigos (lvl) pro SM-2
  if (it.ef === undefined) { it.ef = 2.5; it.interval = INTERVALS[it.lvl || 0] || 1; it.streak = it.lvl || 0; }
  const q = ok ? (typed ? 5 : 4) : 2; // qualidade 0-5 (implícita: acerto digitado > acerto mcq > erro)
  if (q < 3) {
    it.streak = 0;
    it.interval = 1; // errou: volta pra amanhã
  } else {
    it.streak = (it.streak || 0) + 1;
    if (it.streak === 1) it.interval = 1;
    else if (it.streak === 2) it.interval = 6;
    else it.interval = Math.round(it.interval * it.ef);
  }
  // ajuste do fator de facilidade (fórmula original do SM-2)
  it.ef = Math.max(1.3, it.ef + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
  it.reps = (it.reps || 0) + (ok ? 1 : 0);
  const d = new Date(); d.setDate(d.getDate() + Math.min(it.interval, 365));
  it.due = d.toISOString().slice(0, 10);
}
function srsKey(v) { return norm(v.la) + "|" + v.cap; }
function srsAdd(v) {
  const k = srsKey(v);
  if (!S.srs[k]) S.srs[k] = { la: v.la, cap: v.cap, ef: 2.5, interval: 0, streak: 0, due: todayKey(), reps: 0 };
}
function srsAnswer(k, ok, typed) {
  const it = S.srs[k]; if (!it) return;
  sm2Update(it, ok, typed);
  save();
}

/* ---------- cards de frase (sentence mining) ---------- */
function sentAdd(word, sent, src) {
  if (!S.sents) S.sents = {};
  const id = norm(word) + "|" + norm(sent).slice(0, 24);
  if (S.sents[id]) { toast("Essa frase já está na revisão"); return; }
  S.sents[id] = { word, sent, src, ef: 2.5, interval: 0, streak: 0, due: todayKey(), reps: 0 };
  save(); renderStats();
  toast("➕ Frase adicionada à Repetītiō!");
}
function dueSents() {
  const t = todayKey();
  return Object.entries(S.sents || {}).filter(([, it]) => it.due <= t);
}
function sentAnswer(id, ok, typed) {
  const it = (S.sents || {})[id]; if (!it) return;
  sm2Update(it, ok, typed);
  save();
}
function dueWords() {
  const t = todayKey();
  return Object.entries(S.srs).filter(([, it]) => it.due <= t).map(([k, it]) => {
    const ch = COURSE.find(c => c.num === it.cap);
    const v = ch && ch.vocab.find(v => norm(v.la) === k.split("|")[0]);
    return v ? { k, v } : null;
  }).filter(Boolean);
}

/* ---------- course structure ---------- */
function lessonsOf(ch) {
  // Ordem do livro: primeiro LÊ o capítulo (per se illustrata!),
  // depois vocabulário, gramática e pensa.
  const ls = [{ id: `c${ch.num}-l`, name: "Lēctiō", icon: "📖", kind: "lectio" }];
  const chunks = [];
  for (let i = 0; i < ch.vocab.length; i += 9) chunks.push(ch.vocab.slice(i, i + 9));
  chunks.forEach((c, i) => ls.push({ id: `c${ch.num}-v${i}`, name: `Vocābula ${["I", "II", "III", "IV"][i] || i + 1}`, icon: "🃏", kind: "vocab", words: c }));
  const half = Math.ceil(ch.pensum.length / 2);
  ls.push({ id: `c${ch.num}-g`, name: "Grammatica", icon: "🏺", kind: "pensum", items: ch.pensum.slice(0, half), showGrammar: true });
  ls.push({ id: `c${ch.num}-p`, name: "Pēnsum", icon: "✒️", kind: "pensum", items: ch.pensum.slice(half) });
  return ls;
}
function chapterProgress(ch) {
  const ls = lessonsOf(ch);
  const done = ls.filter(l => S.lessons[l.id]).length;
  return { done, total: ls.length, pct: Math.round(done / ls.length * 100) };
}
function chapterUnlocked(ch) {
  if (ch.num === 1) return true;
  const prev = COURSE.find(c => c.num === ch.num - 1);
  return chapterProgress(prev).done >= chapterProgress(prev).total - 1; // lectio pode ficar por último
}
function maxUnlockedCap() {
  let m = 1;
  COURSE.forEach(ch => { if (chapterUnlocked(ch)) m = ch.num; });
  return m;
}

/* ============================================================
   LESSON ENGINE
   ============================================================ */
let L = null; // current lesson session

function startLesson(chNum, lessonId) {
  const ch = COURSE.find(c => c.num == chNum);
  const lesson = lessonsOf(ch).find(l => l.id === lessonId);
  if (!lesson) return;
  let queue = [];
  if (lesson.kind === "vocab") queue = buildVocabQueue(ch, lesson.words);
  if (lesson.kind === "pensum") queue = lesson.items.map(x => ({ ...x }));
  if (lesson.kind === "lectio") { openLectio(ch); return; }
  L = { ch, lesson, queue, idx: 0, total: queue.length, correct: 0, wrong: 0, combo: 0, best: 0, xp: 0 };
  if (lesson.showGrammar) renderGrammarIntro();
  else renderExercise();
}

function buildVocabQueue(ch, words) {
  const q = [];
  words.forEach(v => q.push({ t: "flash", v }));
  const drills = [];
  words.forEach(v => {
    drills.push({ t: "mcqv", dir: "la>pt", v });
    drills.push({ t: "mcqv", dir: "pt>la", v });
  });
  const d = shuffle(drills).slice(0, Math.min(9, drills.length));
  // dois exercícios de escuta
  shuffle(words).slice(0, 2).forEach((v, i) => d.splice(2 + i * 3, 0, { t: "listen", v }));
  // um exercício de pares no meio
  d.splice(Math.floor(d.length / 2), 0, { t: "pairs", words: shuffle(words).slice(0, 5) });
  // duas digitações no final (só palavras simples, sem "a / b" ou "a, b")
  const typable = words.filter(v => !/[\/,…()]/.test(v.la));
  shuffle(typable).slice(0, 2).forEach(v => d.push({ t: "typev", v }));
  return q.concat(d);
}

function renderGrammarIntro() {
  let h = `<div class="lesson-top"><button class="btn-quit" onclick="App.go('home')">✕</button>
    <h1 class="page-title" style="margin:0">Cap. ${L.ch.roman} — Grammatica nova</h1></div>`;
  L.ch.grammar.forEach(g => { h += `<div class="gram-card glass"><h3>${g.title}</h3><p>${g.html}</p></div>`; });
  h += `<button class="btn-main" onclick="renderExercise()">Agora pratica ⚡</button>`;
  $("#view").innerHTML = h;
  window.scrollTo(0, 0);
}

function lessonHeader() {
  const pct = Math.round(L.idx / L.total * 100);
  return `<div class="lesson-top">
    <button class="btn-quit" onclick="App.go('home')">✕</button>
    <div class="progressbar"><div style="width:${pct}%"></div></div>
    <div class="combo">${L.combo > 1 ? "🔥" + L.combo : ""}</div>
  </div>`;
}

function renderExercise() {
  if (!L || L.idx >= L.queue.length) return finishLesson();
  const ex = L.queue[L.idx];
  let h = lessonHeader();
  if (ex.t === "flash") h += exFlash(ex);
  else if (ex.t === "mcqv") h += exMcqVocab(ex);
  else if (ex.t === "mcq") h += exMcq(ex);
  else if (ex.t === "cloze") h += exCloze(ex);
  else if (ex.t === "build") h += exBuild(ex);
  else if (ex.t === "type" || ex.t === "typev") h += exType(ex);
  else if (ex.t === "pairs") h += exPairs(ex);
  else if (ex.t === "gap") h += exGap(ex);
  else if (ex.t === "listen") h += exListen(ex);
  else if (ex.t === "read") h += exRead(ex);
  h += `<div id="feedback" class="feedback"><div class="fb-text" id="fb-text"></div></div>
  <button id="btn-continue" class="btn-main" onclick="nextExercise()" style="display:none">Continuar</button>
  <p class="kbd-hint"><kbd>1</kbd>–<kbd>9</kbd> escolhe · <kbd>Enter</kbd> confirma/continua · <kbd>⌫</kbd> desfaz</p>`;
  $("#view").innerHTML = h;
  const inp = $("#type-input"); if (inp) { inp.focus(); inp.addEventListener("keydown", e => { if (e.key === "Enter") checkType(); }); }
  if (ex.t === "flash") speak(ex.v.la);
  if (ex.t === "listen") setTimeout(() => speak(ex._say), 250);
  if (ex.t === "read") bindReaderWords();
  if (ex.t === "pairs") window._pairSel = null;
  window.scrollTo(0, 0);
}

/* ---- exercise renderers ---- */
function exFlash(ex) {
  const v = ex.v;
  const canBack = L.idx > 0 && L.queue[L.idx - 1].t === "flash";
  return `<div class="exercise glass"><div class="ex-kind">Palavra nova ${L.idx + 1}/${L.queue.filter(x => x.t === "flash").length}</div>
    <div class="flashcard">
      <div class="fc-word">${esc(v.la)}</div>

      <div class="fc-pt">${esc(v.pt)}</div>

    </div>

      <button class="btn-main" style="flex:1" onclick="flashNext()">Entendi →</button>
    </div></div>`;
}
function flashNext() {
  const ex = L.queue[L.idx];
  if (!ex._seen) { ex._seen = true; addXP(1); L.xp += 1; }
  L.idx++; renderExercise();
}
function flashPrev() {
  if (L && L.idx > 0 && L.queue[L.idx - 1].t === "flash") { L.idx--; renderExercise(); }
}

function exMcqVocab(ex) {
  const v = ex.v;
  const pool = L.ch.vocab.filter(x => x.la !== v.la);
  const dis = shuffle(pool).slice(0, 3);
  const la2pt = ex.dir === "la>pt";
  const opts = shuffle([v, ...dis]);
  ex._answer = opts.indexOf(v);
  ex._opts = opts;
  return `<div class="exercise glass"><div class="ex-kind">${la2pt ? "O que significa?" : "Como se diz em latim?"}</div>
    <div class="ex-prompt ${la2pt ? "la" : ""}">${la2pt ? `<span class="la">${esc(v.la)}</span> <button class="speak-btn" onclick="speak('${esc(v.la).replace(/'/g, "\\'")}')">🔊</button>` : esc(v.pt)}</div>
    <div class="options">${opts.map((o, i) =>
      `<button class="opt" onclick="checkMcq(${i})">${la2pt ? esc(o.pt) : `<span class="la">${esc(o.la)}</span>`}</button>`).join("")}</div></div>`;
}
function exMcq(ex) {
  ex._answer = ex.a;
  return `<div class="exercise glass"><div class="ex-kind">Escolha</div>
    <div class="ex-prompt">${esc(ex.q)}</div>
    <div class="options">${ex.options.map((o, i) => `<button class="opt" onclick="checkMcq(${i})"><span class="la">${esc(o)}</span></button>`).join("")}</div></div>`;
}
function exCloze(ex) {
  ex._answer = ex.a;
  return `<div class="exercise glass"><div class="ex-kind">Complete a terminação</div>
    <div class="ex-prompt la">${esc(ex.prompt)}</div>
    <div class="options">${ex.options.map((o, i) => `<button class="opt" onclick="checkMcq(${i})"><span class="la">${esc(o)}</span></button>`).join("")}</div></div>`;
}
function checkMcq(i) {
  const ex = L.queue[L.idx];
  const ok = i === ex._answer;
  document.querySelectorAll(".opt").forEach((b, j) => {
    b.disabled = true;
    if (j === ex._answer) b.classList.add("correct");
    else if (j === i && !ok) b.classList.add("wrong");
  });
  feedback(ok, ex.why || (ex._opts ? `${ex._opts[ex._answer].la} = ${ex._opts[ex._answer].pt}` : ""), ex);
}

function exBuild(ex) {
  const words = ex.la.split(" ");
  ex._target = normPhrase(ex.la);
  const bank = shuffle(words.concat(ex.extra || []));
  return `<div class="exercise glass"><div class="ex-kind">Monte a frase em latim</div>
    <div class="ex-prompt">${esc(ex.pt)}</div>
    <div class="build-area" id="build-area"></div>
    <div class="bank" id="bank">${bank.map((w, i) => `<button class="token la" id="tok${i}" onclick="tokTap(${i},'${esc(w).replace(/'/g, "\\'")}')">${esc(w)}</button>`).join("")}</div>
    <button class="btn-main" id="btn-check" onclick="checkBuild()" disabled>Verificar</button></div>`;
}
window._built = [];
function tokTap(i, w) {
  const tok = $(`#tok${i}`);
  if (tok.classList.contains("ghost")) return;
  tok.classList.add("ghost");
  window._built.push({ i, w });
  redrawBuild();
}
function redrawBuild() {
  $("#build-area").innerHTML = window._built.map((t, j) =>
    `<button class="token la" data-i="${t.i}" data-w="${esc(t.w)}" onclick="tokRemove(${j})">${esc(t.w)}</button>`).join("");
  $("#btn-check").disabled = window._built.length === 0;
  [...$("#build-area").children].forEach(tok => { tok.onpointerdown = e => tokDragStart(e, tok); });
}
function tokRemove(j) {
  if (window._justDragged) return; // clique fantasma pós-arrasto
  const t = window._built.splice(j, 1)[0];
  $(`#tok${t.i}`).classList.remove("ghost");
  redrawBuild();
}
/* arrastar-e-soltar pra reordenar a frase (pointer events = mouse + touch) */
function tokDragStart(e, tok) {
  const sx = e.clientX, sy = e.clientY;
  let started = false;
  const move = ev => {
    if (!started) {
      if (Math.hypot(ev.clientX - sx, ev.clientY - sy) < 8) return;
      started = true;
      tok.classList.add("dragging");
    }
    ev.preventDefault();
    const area = $("#build-area");
    if (!area) return;
    const others = [...area.children].filter(c => c !== tok);
    let placed = false;
    for (const o of others) {
      const r = o.getBoundingClientRect();
      const sameRow = ev.clientY >= r.top - 6 && ev.clientY <= r.bottom + 6;
      if (ev.clientY < r.top - 6 || (sameRow && ev.clientX < r.left + r.width / 2)) {
        area.insertBefore(tok, o); placed = true; break;
      }
    }
    if (!placed) area.appendChild(tok);
  };
  const up = () => {
    document.removeEventListener("pointermove", move);
    document.removeEventListener("pointerup", up);
    document.removeEventListener("pointercancel", up);
    if (started) {
      tok.classList.remove("dragging");
      const area = $("#build-area");
      if (area) window._built = [...area.children].map(el => ({ i: +el.dataset.i, w: el.dataset.w }));
      window._justDragged = true;
      setTimeout(() => { window._justDragged = false; }, 250);
      redrawBuild();
    }
  };
  document.addEventListener("pointermove", move, { passive: false });
  document.addEventListener("pointerup", up);
  document.addEventListener("pointercancel", up);
}
function checkBuild() {
  const ex = L.queue[L.idx];
  const got = normPhrase(window._built.map(t => t.w).join(" "));
  const exact = got === ex._target;
  // latim tem ordem livre: aceita qualquer ordem com exatamente as palavras certas
  const bag = s => s.split(" ").sort().join(" ");
  const okBag = !exact && bag(got) === bag(ex._target);
  const ok = exact || okBag;
  $("#btn-check").style.display = "none";
  window._built = [];
  feedback(ok, ok ? (okBag ? `Ordem também válida! No livro: "${ex.la}"` : "") : `Resposta: "${ex.la}"`, ex);
  if (ok) speak(ex.la);
}

function exType(ex) {
  const v = ex.v;
  const prompt = ex.t === "typev" ? `Escreva em latim: <b>${esc(v.pt)}</b>` : esc(ex.prompt);
  ex._answers = ex.t === "typev"
    ? [v.la, ...v.la.split(/[,\/…]| — /).map(s => s.trim()).filter(Boolean)]
    : ex.a;
  return `<div class="exercise glass"><div class="ex-kind">Digite</div>
    <div class="ex-prompt">${prompt}</div>
    ${ex.t === "typev" ? `<div class="ex-hint">${esc(v.forms)} — não precisa dos tracinhos (ā ē ī ō ū)</div>` : `<div class="ex-hint">Macrons são opcionais.</div>`}
    <input id="type-input" class="type-input" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="scrībe hīc…">
    <button class="btn-main" id="btn-check" onclick="checkType()">Verificar</button></div>`;
}
function checkType() {
  const ex = L.queue[L.idx];
  if ($("#btn-check").style.display === "none") return;
  const got = norm($("#type-input").value);
  const ok = ex._answers.some(a => norm(a) === got);
  $("#btn-check").style.display = "none";
  $("#type-input").disabled = true;
  const model = ex.t === "typev" ? ex._answers[0] : ex._answers[ex._answers.length - 1];
  feedback(ok, ok ? (ex.why || "") : `Resposta: "${model}"${ex.why ? " — " + ex.why : ""}`, ex);
  if (ok) speak(model);
}

function exGap(ex) {
  ex._answers = ex.a;
  const parts = ex.prompt.split("___");
  return `<div class="exercise glass"><div class="ex-kind">Complete a lacuna</div>
    <div class="ex-prompt la" style="line-height:2.4">${esc(parts[0])}<input id="type-input" class="type-input gap-input" autocomplete="off" autocapitalize="off" spellcheck="false">${esc(parts[1] || "")}</div>
    ${ex.hint ? `<div class="ex-hint">${esc(ex.hint)}</div>` : `<div class="ex-hint">Macrons são opcionais.</div>`}
    <button class="btn-main" id="btn-check" onclick="checkType()">Verificar</button></div>`;
}

function exListen(ex) {
  if (ex.v) { // palavra do vocabulário (gerado automaticamente)
    const pool = L.ch.vocab.filter(x => x.la !== ex.v.la);
    const opts = shuffle([ex.v, ...shuffle(pool).slice(0, 3)]);
    ex._answer = opts.indexOf(ex.v);
    ex._opts = opts;
    ex._say = ex.v.la;
    return `<div class="exercise glass"><div class="ex-kind">O que você ouviu?</div>
      <div class="listen-big"><button class="listen-btn" onclick="speak(L.queue[L.idx]._say)">🔊</button>
      <button class="speak-btn" onclick="const r=S.rate;S.rate=0.6;speak(L.queue[L.idx]._say);S.rate=r;">🐢 devagar</button></div>
      <div class="options">${opts.map((o, i) => `<button class="opt" onclick="checkMcq(${i})"><span class="la">${esc(o.la)}</span></button>`).join("")}</div></div>`;
  }
  // frase hand-authored: {text, options, a, why}
  ex._answer = ex.a;
  ex._say = ex.text;
  return `<div class="exercise glass"><div class="ex-kind">Escute a frase</div>
    <div class="listen-big"><button class="listen-btn" onclick="speak(L.queue[L.idx]._say)">🔊</button>
    <button class="speak-btn" onclick="const r=S.rate;S.rate=0.6;speak(L.queue[L.idx]._say);S.rate=r;">🐢 devagar</button></div>
    <div class="ex-hint">Qual frase você ouviu?</div>
    <div class="options">${ex.options.map((o, i) => `<button class="opt" onclick="checkMcq(${i})"><span class="la">${esc(o)}</span></button>`).join("")}</div></div>`;
}

function exRead(ex) {
  ex._answer = ex.a;
  return `<div class="exercise glass"><div class="ex-kind">Leia e responda</div>
    <div class="reader-text mini-read">${readerHTML(ex.text, true)}</div>
    <div class="ex-prompt la" style="font-size:1.08rem;margin-top:14px">${esc(ex.q)}</div>
    <div class="options">${ex.options.map((o, i) => `<button class="opt" onclick="checkMcq(${i})"><span class="la">${esc(o)}</span></button>`).join("")}</div>
    <div class="ex-hint" style="margin-top:8px">👆 dá pra tocar nas palavras do texto</div></div>`;
}

function exPairs(ex) {
  ex._left = ex.words.map(v => ({ id: norm(v.la), txt: v.la, la: true }));
  ex._right = shuffle(ex.words.map(v => ({ id: norm(v.la), txt: v.pt })));
  ex._remaining = ex.words.length;
  const cells = [];
  for (let i = 0; i < ex.words.length; i++) {
    cells.push(ex._left[i], ex._right[i]);
  }
  return `<div class="exercise glass"><div class="ex-kind">Ligue os pares</div>
    <div class="pairs-grid">${cells.map((c, i) =>
      `<button class="pair-btn" id="pair${i}" data-id="${c.id}" onclick="pairTap(${i})">${c.la ? `<span class="la">${esc(c.txt)}</span>` : esc(c.txt)}</button>`).join("")}</div></div>`;
}
function pairTap(i) {
  const btn = $(`#pair${i}`);
  const ex = L.queue[L.idx];
  if (window._pairSel === null || window._pairSel === undefined) { window._pairSel = i; btn.classList.add("sel"); return; }
  if (window._pairSel === i) { btn.classList.remove("sel"); window._pairSel = null; return; }
  const prev = $(`#pair${window._pairSel}`);
  if (prev.dataset.id === btn.dataset.id) {
    prev.classList.add("done"); btn.classList.add("done");
    prev.classList.remove("sel");
    ex._remaining--;
    addXP(1); L.xp += 1;
    if (ex._remaining === 0) { L.combo++; L.best = Math.max(L.best, L.combo); L.correct++; setTimeout(() => { L.idx++; renderExercise(); }, 350); }
  } else {
    prev.classList.remove("sel");
    prev.classList.add("shake"); btn.classList.add("shake");
    setTimeout(() => { prev.classList.remove("shake"); btn.classList.remove("shake"); }, 350);
  }
  window._pairSel = null;
}

/* ---- feedback & flow ---- */
function feedback(ok, note, ex) {
  const fb = $("#feedback");
  fb.classList.add("show", ok ? "ok" : "bad");
  $("#fb-text").innerHTML = ok
    ? `✅ <b>Rēctē!</b> +${2 + Math.min(L.combo, 3)} XP${note ? `<small>${note}</small>` : ""}`
    : `❌ <b>Nōn rēctē.</b>${note ? `<small>${note}</small>` : ""}`;
  $("#btn-continue").style.display = "";
  $("#btn-continue").focus();
  if (ok) { L.combo++; L.best = Math.max(L.best, L.combo); L.correct++; const gain = 2 + Math.min(L.combo, 3); addXP(gain); L.xp += gain; }
  else {
    L.combo = 0; L.wrong++;
    // reenfileira o exercício errado (estilo Duolingo)
    const clone = { ...ex }; delete clone._answer; delete clone._opts; delete clone._answers; delete clone._target;
    L.queue.push(clone); L.total++;
  }
  if (ex._srsKey) srsAnswer(ex._srsKey, ok, ex.t === "typev" || ex.t === "type" || ex.t === "gap");
  if (ex._sentKey) sentAnswer(ex._sentKey, ok, true);
}
function nextExercise() { L.idx++; renderExercise(); }

function finishLesson() {
  bumpStreak();
  if (L.lesson) S.lessons[L.lesson.id] = true;
  // agenda vocab no SRS
  if (L.lesson && L.lesson.kind === "vocab") L.lesson.words.forEach(v => srsAdd({ ...v, cap: L.ch.num }));
  save(); renderStats();
  const acc = L.correct + L.wrong === 0 ? 100 : Math.round(L.correct / (L.correct + L.wrong) * 100);
  $("#view").innerHTML = `<div class="lesson-end glass">
    <div class="big">${acc >= 90 ? "🏆" : acc >= 70 ? "🎉" : "💪"}</div>
    <h2>${acc >= 90 ? "Optimē!" : acc >= 70 ? "Bene!" : "Perge!"}</h2>
    <p style="color:var(--text-dim)">${L.lesson ? L.lesson.name : "Repetītiō"} concluída</p>
    <div class="end-stats">
      <div class="end-stat"><b>+${L.xp}</b><span>XP</span></div>
      <div class="end-stat"><b>${acc}%</b><span>acertos</span></div>
      <div class="end-stat"><b>🔥${L.best}</b><span>melhor combo</span></div>
    </div>
    <button class="btn-main" onclick="App.go('home')">Continuar</button>
  </div>`;
  L = null;
}
